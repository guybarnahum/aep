name: Validate Multi-Worker Safety

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: validate-multi-worker-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-multi-worker:
    runs-on: ubuntu-latest
    environment: async-validation
    defaults:
      run:
        shell: bash -eo pipefail {0}

    env:
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      OPERATOR_AGENT_BASE_URL: ${{ secrets.ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL }}
      CF_ENV: async_validation
      HEALTH_RUNTIME_ENV: dev
      D1_DATABASE_NAME: aep-async-validation
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy control plane
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Check operator-agent configuration
        id: operator_agent_config
        run: |
          if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Multi-worker department safety
        id: multi_worker_department
        if: steps.operator_agent_config.outputs.enabled == 'true'
        run: |
          npm run ci:multi-worker-department-check | tee multi-worker-department.log

      - name: Agent timeout recovery
        id: agent_timeout_recovery
        if: steps.operator_agent_config.outputs.enabled == 'true'
        run: |
          npm run ci:agent-timeout-recovery-check | tee agent-timeout-recovery.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          status_text() {
            case "$1" in
              success) echo "passed" ;;
              failure) echo "failed" ;;
              cancelled) echo "cancelled" ;;
              skipped) echo "skipped" ;;
              *) echo "unknown" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          MULTI_WORKER_OUTCOME="${{ steps.multi_worker_department.outcome }}"
          TIMEOUT_RECOVERY_OUTCOME="${{ steps.agent_timeout_recovery.outcome }}"

          echo "## Multi-worker safety validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: $D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Environment bring-up" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Cross-worker governance and safety" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MULTI_WORKER_OUTCOME") Multi-worker department safety: $MULTI_WORKER_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Validates safe multi-worker supervision" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Ensures approval gating protects sensitive actions" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Confirms no unsafe state drift across workers" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$TIMEOUT_RECOVERY_OUTCOME") Agent timeout recovery: $TIMEOUT_RECOVERY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Validates safe recovery from agent timeouts" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Ensures no budget corruption on timeout" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" != "true" ]]; then
            echo "- ⚪ Operator-agent checks skipped: ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            echo "- Environment bring-up failed. Start with deploy, migrations, readiness, and /healthz before investigating safety logic." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Environment bring-up passed." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && "$MULTI_WORKER_OUTCOME" != "success" ]]; then
            echo "- Multi-worker department safety failed. Inspect cross-worker coordination, approval gating logic, and state consistency." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && "$TIMEOUT_RECOVERY_OUTCOME" != "success" ]]; then
            echo "- Agent timeout recovery failed. Inspect timeout handling, budget preservation, and retry/resume logic." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Overall verdict" >> "$GITHUB_STEP_SUMMARY"

          ALL_ENV_OK="true"
          if [[ "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            ALL_ENV_OK="false"
          fi

          ALL_SAFETY_OK="true"
          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && ( "$MULTI_WORKER_OUTCOME" != "success" || "$TIMEOUT_RECOVERY_OUTCOME" != "success" ) ]]; then
            ALL_SAFETY_OK="false"
          fi

          if [[ "$ALL_ENV_OK" == "true" && "$ALL_SAFETY_OK" == "true" ]]; then
            if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" ]]; then
              echo "- ✅ Multi-worker safety validation passed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚪ Multi-worker safety checks skipped because ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is not configured." >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [[ "$ALL_ENV_OK" == "false" ]]; then
            echo "- ❌ Environment bring-up failed; safety results may be incomplete or misleading." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ Environment bring-up passed, but one or more safety validation checks failed." >> "$GITHUB_STEP_SUMMARY"
          fi
