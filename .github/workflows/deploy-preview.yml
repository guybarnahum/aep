name: Deploy Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run test:backend

      - run: npm test

  deploy-preview-env:
    needs: preflight
    uses: ./.github/workflows/_deploy_preview_environment.yml
    with:
      environment_name: preview
      git_sha: ${{ github.sha }}
      health_runtime_env: preview
      deploy_operator_agent: false
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  validate-preview-post-deploy:
    needs: deploy-preview-env
    uses: ./.github/workflows/_validate_post_deploy.yml
    with:
      environment_name: preview
      control_plane_base_url: ${{ needs.deploy-preview-env.outputs.control_plane_base_url }}
      cf_env: preview
      git_sha: ${{ needs.deploy-preview-env.outputs.git_sha }}
      node_version: "20"
      validation_level: full
    secrets: inherit

  final-summary:
    needs:
      - preflight
      - deploy-preview-env
      - validate-preview-post-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Preview aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preflight: ${{ needs.preflight.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy environment: ${{ needs.deploy-preview-env.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview key: ${{ needs.deploy-preview-env.outputs.preview_key }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker name: ${{ needs.deploy-preview-env.outputs.worker_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- D1 database: ${{ needs.deploy-preview-env.outputs.d1_database_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL: ${{ needs.deploy-preview-env.outputs.control_plane_base_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lifecycle: ephemeral preview; destroyed on PR close via destroy-preview.yml" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment layer: covered by _deploy_preview_environment.yml health/readiness flow" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.validate-preview-post-deploy.outputs.enabled }}" != "true" ]]; then
            echo "- Scenarios layer: skipped (warning: operator-agent base URL not configured for the preview environment)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- Scenarios layer: ${{ needs.validate-preview-post-deploy.outputs.outcome }} (attention: WARN/SKIP entries present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Scenarios layer: ${{ needs.validate-preview-post-deploy.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.preflight.result }}" != "success" ]]; then
            echo "- ❌ Preview deploy lane failed during preflight validation." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-preview-env.result }}" != "success" ]]; then
            echo "- ❌ Preview deploy lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.enabled }}" == "true" && "${{ needs.validate-preview-post-deploy.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Preview environment deployed, but scenario-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- ⚠️ Preview deploy lane passed with scenario-layer warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Preview deploy lane passed." >> "$GITHUB_STEP_SUMMARY"
          fi