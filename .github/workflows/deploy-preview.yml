name: Deploy Preview

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm test

  debug-preview-secrets:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: preview
      deployment: false
    outputs:
      deploy_url: ${{ steps.resolve.outputs.deploy_url }}
      operator_agent_base_url: ${{ steps.resolve.outputs.operator_agent_base_url }}
    steps:
      - name: Debug preview environment configuration presence
        run: |
          if [[ -n "${{ vars.DEPLOY_URL }}" ]]; then
            echo "PREVIEW_DEPLOY_URL_VAR_PRESENT=true"
          else
            echo "PREVIEW_DEPLOY_URL_VAR_PRESENT=false"
          fi

          if [[ -n "${{ vars.OPERATOR_AGENT_BASE_URL }}" ]]; then
            echo "PREVIEW_OPERATOR_AGENT_BASE_URL_VAR_PRESENT=true"
          else
            echo "PREVIEW_OPERATOR_AGENT_BASE_URL_VAR_PRESENT=false"
          fi

          if [[ -n "${{ secrets.PREVIEW_BASE_URL }}" ]]; then
            echo "PREVIEW_BASE_URL_SECRET_PRESENT=true"
          else
            echo "PREVIEW_BASE_URL_SECRET_PRESENT=false"
          fi

          if [[ -n "${{ secrets.PREVIEW_OPERATOR_AGENT_BASE_URL }}" ]]; then
            echo "PREVIEW_OPERATOR_AGENT_BASE_URL_SECRET_PRESENT=true"
          else
            echo "PREVIEW_OPERATOR_AGENT_BASE_URL_SECRET_PRESENT=false"
          fi

          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
            echo "PREVIEW_CLOUDFLARE_API_TOKEN_PRESENT=true"
          else
            echo "PREVIEW_CLOUDFLARE_API_TOKEN_PRESENT=false"
          fi

          if [[ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            echo "PREVIEW_CLOUDFLARE_ACCOUNT_ID_PRESENT=true"
          else
            echo "PREVIEW_CLOUDFLARE_ACCOUNT_ID_PRESENT=false"
          fi

      - name: Resolve preview base URLs
        id: resolve
        run: |
          DEPLOY_URL_SOURCE="missing"
          DEPLOY_URL="${{ vars.DEPLOY_URL }}"
          if [[ -n "$DEPLOY_URL" ]]; then
            DEPLOY_URL_SOURCE="vars.DEPLOY_URL"
          else
            DEPLOY_URL="${{ secrets.PREVIEW_BASE_URL }}"
            if [[ -n "$DEPLOY_URL" ]]; then
              DEPLOY_URL_SOURCE="secrets.PREVIEW_BASE_URL"
            fi
          fi

          OPERATOR_AGENT_BASE_URL_SOURCE="missing"
          OPERATOR_AGENT_BASE_URL="${{ vars.OPERATOR_AGENT_BASE_URL }}"
          if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
            OPERATOR_AGENT_BASE_URL_SOURCE="vars.OPERATOR_AGENT_BASE_URL"
          else
            OPERATOR_AGENT_BASE_URL="${{ secrets.PREVIEW_OPERATOR_AGENT_BASE_URL }}"
            if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
              OPERATOR_AGENT_BASE_URL_SOURCE="secrets.PREVIEW_OPERATOR_AGENT_BASE_URL"
            fi
          fi

          echo "Resolved preview deploy URL source: $DEPLOY_URL_SOURCE"
          echo "Resolved preview operator-agent URL source: $OPERATOR_AGENT_BASE_URL_SOURCE"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "operator_agent_base_url=$OPERATOR_AGENT_BASE_URL" >> "$GITHUB_OUTPUT"

  deploy-preview-env:
    needs:
      - test
      - debug-preview-secrets
    uses: ./.github/workflows/_deploy_environment.yml
    with:
      environment_name: preview
      deploy_url: ${{ needs.debug-preview-secrets.outputs.deploy_url }}
      operator_agent_base_url_fallback: ${{ needs.debug-preview-secrets.outputs.operator_agent_base_url }}
      cf_env: preview
      git_sha: ${{ github.sha }}
      health_runtime_env: preview
      wrangler_config: core/control-plane/wrangler.toml
      d1_database_name: aep-preview
      deploy_operator_agent: false
      operator_agent_wrangler_config: core/operator-agent/wrangler.jsonc
      operator_agent_d1_database_name: aep-operator-agent-preview
      enable_test_endpoints: "false"
      insecure_allow_version_mismatch: true
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  debug-preview-deploy-outputs:
    needs: deploy-preview-env
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Debug reusable deploy outputs
        run: |
          if [[ -n "${{ needs.deploy-preview-env.outputs.deploy_url }}" ]]; then
            echo "PREVIEW_DEPLOY_URL_OUTPUT_PRESENT=true"
          else
            echo "PREVIEW_DEPLOY_URL_OUTPUT_PRESENT=false"
          fi

          if [[ -n "${{ needs.deploy-preview-env.outputs.operator_agent_url }}" ]]; then
            echo "PREVIEW_OPERATOR_AGENT_URL_OUTPUT_PRESENT=true"
          else
            echo "PREVIEW_OPERATOR_AGENT_URL_OUTPUT_PRESENT=false"
          fi

          if [[ -n "${{ needs.deploy-preview-env.outputs.cf_env }}" ]]; then
            echo "PREVIEW_CF_ENV_OUTPUT_PRESENT=true"
          else
            echo "PREVIEW_CF_ENV_OUTPUT_PRESENT=false"
          fi

          if [[ -n "${{ needs.deploy-preview-env.outputs.git_sha }}" ]]; then
            echo "PREVIEW_GIT_SHA_OUTPUT_PRESENT=true"
          else
            echo "PREVIEW_GIT_SHA_OUTPUT_PRESENT=false"
          fi

  validate-preview-smoke:
    needs:
      - deploy-preview-env
      - debug-preview-deploy-outputs
    uses: ./.github/workflows/_validate_control_plane_smoke.yml
    with:
      environment_name: preview
      deploy_url: ${{ needs.deploy-preview-env.outputs.deploy_url }}
      cf_env: ${{ needs.deploy-preview-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-preview-env.outputs.git_sha }}
      node_version: "20"
      smoke_method: "POST"
      smoke_path: "/workflow/start"
      smoke_payload: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status: "202"
      expect_json_key: "workflow_run_id"
      poll_path_template: "/workflow/{id}"
      poll_id_key: "workflow_run_id"
      poll_success_key: "run.status"
      poll_success_values: "completed"
      poll_failure_values: "failed,cancelled"
      poll_attempts: "20"
      poll_interval_ms: "3000"
    secrets: inherit

  validate-preview-post-deploy:
    needs:
      - deploy-preview-env
      - debug-preview-deploy-outputs
    uses: ./.github/workflows/_validate_post_deploy.yml
    with:
      environment_name: preview
      deploy_url: ${{ needs.deploy-preview-env.outputs.deploy_url }}
      operator_agent_base_url: ${{ needs.deploy-preview-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-preview-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-preview-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  final-summary:
    needs:
      - deploy-preview-env
      - validate-preview-smoke
      - validate-preview-post-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Preview aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy environment: ${{ needs.deploy-preview-env.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane smoke: ${{ needs.validate-preview-smoke.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.validate-preview-post-deploy.outputs.enabled }}" != "true" ]]; then
            echo "- Post-deploy validation: skipped (warning: operator-agent base URL not configured for the preview environment)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- Post-deploy validation: ${{ needs.validate-preview-post-deploy.outputs.outcome }} (attention: WARN/SKIP entries present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Post-deploy validation: ${{ needs.validate-preview-post-deploy.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.deploy-preview-env.result }}" != "success" ]]; then
            echo "- ❌ Preview deploy lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-smoke.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Preview environment deployed, but control-plane smoke validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.enabled }}" == "true" && "${{ needs.validate-preview-post-deploy.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Preview environment and smoke passed, but post-deploy validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-preview-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- ⚠️ Preview deploy lane passed with post-deploy warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Preview deploy lane passed." >> "$GITHUB_STEP_SUMMARY"
          fi
