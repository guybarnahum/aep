name: Deploy Preview

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm test

  deploy-preview:
    needs: test
    runs-on: ubuntu-latest
    environment: preview
    defaults:
      run:
        shell: bash -eo pipefail {0}
    permissions:
      contents: read
    env:
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.PREVIEW_BASE_URL }}
      CF_ENV: preview
      D1_DATABASE_NAME: aep-preview
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy to Cloudflare
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$CF_ENV" \
            --sha "$GIT_SHA" \
            --insecure-allow-version-mismatch true \
            --service control-plane | tee health-check.log

      - name: Smoke test
        id: smoke_test
        run: |
          npx tsx scripts/ci/smoke-test.ts \
            --base-url "$DEPLOY_URL" \
            --env "$CF_ENV" \
            --method POST \
            --path /workflow/start \
            --payload '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}' \
            --expect-status 202 \
            --expect-json-key workflow_run_id \
            --poll-path-template /workflow/{id} \
            --poll-id-key workflow_run_id \
            --poll-success-key run.status \
            --poll-success-values completed \
            --poll-failure-values failed,cancelled \
            --poll-attempts 20 \
            --poll-interval-ms 3000 | tee smoke-test.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          SMOKE_OUTCOME="${{ steps.smoke_test.outcome }}"

          echo "## Preview deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: $D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: $GITHUB_EVENT_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Step outcomes" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$SMOKE_OUTCOME") Smoke test: $SMOKE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$HEALTH_OUTCOME" != "success" ]]; then
            echo "> Health check failed. Inspect \`health-check.log\` in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$SMOKE_OUTCOME" != "success" ]]; then
            echo "> Smoke test failed. Inspect \`smoke-test.log\` in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

  post-deploy-validation:
    needs: deploy-preview
    runs-on: ubuntu-latest
    environment: preview
    outputs:
      validation_enabled: ${{ steps.config.outputs.enabled }}
      validation_outcome: ${{ steps.outcome.outputs.value }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    permissions:
      contents: read
    env:
      OPERATOR_AGENT_BASE_URL: ${{ secrets.PREVIEW_OPERATOR_AGENT_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check validation configuration
        id: config
        run: |
          if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run post-deploy validation
        id: post_deploy_validation
        if: steps.config.outputs.enabled == 'true'
        run: npm run ci:post-deploy-validation | tee post-deploy-validation.log

      - name: Capture outcome
        id: outcome
        if: always()
        run: |
          if [[ "${{ steps.config.outputs.enabled }}" != "true" ]]; then
            echo "value=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ steps.post_deploy_validation.outcome }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        if: always()
        run: |
          if [[ "${{ steps.config.outputs.enabled }}" != "true" ]]; then
            echo "## Preview post-deploy validation" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Warning: PREVIEW_OPERATOR_AGENT_BASE_URL is not configured; post-deploy validation skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          OUTCOME="${{ steps.post_deploy_validation.outcome }}"
          echo "## Preview post-deploy validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: $OUTCOME" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$OUTCOME" != "success" ]]; then
            echo "> Post-deploy validation failed. Inspect \`post-deploy-validation.log\` in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

  final-summary:
    needs:
      - deploy-preview
      - post-deploy-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Preview aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy job: ${{ needs.deploy-preview.result }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.post-deploy-validation.outputs.validation_enabled }}" != "true" ]]; then
            echo "- Post-deploy validation: skipped (warning: PREVIEW_OPERATOR_AGENT_BASE_URL not configured)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Post-deploy validation: ${{ needs.post-deploy-validation.outputs.validation_outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi
