name: _Deploy Dashboard Pages

on:
  workflow_call:
    inputs:
      environment_name:
        description: "GitHub environment name to bind job-scoped vars/secrets/policies"
        required: true
        type: string
      pages_project_name:
        description: "Cloudflare Pages project name"
        required: true
        type: string
        control_plane_base_url:
          description: "Optional explicit override for the deployed control-plane Worker URL"
          required: false
          type: string
        operator_agent_base_url:
          description: "Optional explicit override for the deployed operator-agent Worker URL"
          required: false
          type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare API token with Pages deployment permissions"
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: "Cloudflare account ID"
        required: true

concurrency:
  group: deploy-dashboard-pages-${{ inputs.environment_name }}
  cancel-in-progress: false

jobs:
  deploy-dashboard-pages:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}

    permissions:
      contents: read

    defaults:
      run:
        shell: bash -eo pipefail {0}

    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      DEPLOY_URL_INPUT: ${{ inputs.control_plane_base_url }}
      OPERATOR_AGENT_BASE_URL_INPUT: ${{ inputs.operator_agent_base_url }}

      DEPLOY_URL: ${{ vars.DEPLOY_URL }}
      OPERATOR_AGENT_BASE_URL: ${{ vars.OPERATOR_AGENT_BASE_URL }}

      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_OPERATOR_AGENT_BASE_URL: ${{ secrets.STAGING_OPERATOR_AGENT_BASE_URL }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      PRODUCTION_OPERATOR_AGENT_BASE_URL: ${{ secrets.PRODUCTION_OPERATOR_AGENT_BASE_URL }}
      ASYNC_VALIDATION_BASE_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL: ${{ secrets.ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve effective dashboard URLs
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "DEPLOY_URL=$RESOLVED_DEPLOY_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_URL_SOURCE=$RESOLVED_DEPLOY_URL_SOURCE" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL=$RESOLVED_OPERATOR_AGENT_BASE_URL" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL_SOURCE=$RESOLVED_OPERATOR_AGENT_BASE_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Validate resolved dashboard URLs
        run: |
          test -n "${{ inputs.environment_name }}" || { echo "Missing inputs.environment_name" >&2; exit 1; }
          test -n "${{ inputs.pages_project_name }}" || { echo "Missing inputs.pages_project_name" >&2; exit 1; }

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "Missing resolved DEPLOY_URL" >&2
            echo "Resolution order: input -> vars.DEPLOY_URL -> legacy environment fallback" >&2
            exit 1
          fi

          if [[ ! "$DEPLOY_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "Invalid DEPLOY_URL: '$DEPLOY_URL'" >&2
            exit 1
          fi

          if [[ -z "$OPERATOR_AGENT_BASE_URL" ]]; then
            echo "Missing resolved OPERATOR_AGENT_BASE_URL" >&2
            echo "Resolution order: input -> vars.OPERATOR_AGENT_BASE_URL -> legacy environment fallback" >&2
            exit 1
          fi

          if [[ ! "$OPERATOR_AGENT_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "Invalid OPERATOR_AGENT_BASE_URL: '$OPERATOR_AGENT_BASE_URL'" >&2
            exit 1
          fi

      - name: Show deployment configuration
        run: |
          echo "Environment:              ${{ inputs.environment_name }}"
          echo "Pages project:            ${{ inputs.pages_project_name }}"
          echo "Control-plane base URL:   $DEPLOY_URL"
          echo "Control-plane URL source: $DEPLOY_URL_SOURCE"
          echo "Operator-agent base URL:  $OPERATOR_AGENT_BASE_URL"
          echo "Operator-agent URL source:$OPERATOR_AGENT_BASE_URL_SOURCE"

      - name: Install workspace dependencies
        run: npm ci

      - name: Build dashboard
        env:
          VITE_CONTROL_PLANE_BASE_URL: ${{ env.DEPLOY_URL }}
          VITE_OPERATOR_AGENT_BASE_URL: ${{ env.OPERATOR_AGENT_BASE_URL }}
        run: npm --workspace @aep/dashboard run build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name "${{ inputs.pages_project_name }}"

      - name: Write dashboard summary
        if: always()
        run: |
          echo "## Dashboard deployment summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ inputs.environment_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages project: ${{ inputs.pages_project_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane base URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL source: ${DEPLOY_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operator-agent base URL: $OPERATOR_AGENT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operator-agent URL source: ${OPERATOR_AGENT_BASE_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
