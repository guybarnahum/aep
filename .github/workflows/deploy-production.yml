name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: 'Type "deploy-production" to confirm production deployment'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  confirm:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Confirm production deployment
        run: |
          if [[ "${{ github.event.inputs.confirm_production }}" != "deploy-production" ]]; then
            echo "Production deployment confirmation failed." >&2
            echo 'You must type exactly: deploy-production' >&2
            exit 1
          fi

  test:
    needs: confirm
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm test

  deploy-production-env:
    needs: test
    uses: ./.github/workflows/_deploy_environment.yml
    with:
      environment_name: production
      cf_env: production
      git_sha: ${{ github.sha }}
      health_runtime_env: production
      wrangler_config: core/control-plane/wrangler.jsonc
      d1_database_name: aep-production
      deploy_operator_agent: true
      operator_agent_wrangler_config: core/operator-agent/wrangler.jsonc
      operator_agent_d1_database_name: aep-operator-agent-production
      enable_test_endpoints: "false"
      insecure_allow_version_mismatch: false
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  validate-production-environment:
    needs: deploy-production-env
    uses: ./.github/workflows/_validate_environment_layer.yml
    with:
      environment_name: production
      control_plane_base_url: ${{ needs.deploy-production-env.outputs.control_plane_base_url }}
      cf_env: ${{ needs.deploy-production-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-production-env.outputs.git_sha }}
      node_version: "20"
      smoke_method: "POST"
      smoke_path: "/workflow/start"
      smoke_payload: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status: "202"
      expect_json_key: "workflow_run_id"
      poll_path_template: "/workflow/{id}"
      poll_id_key: "workflow_run_id"
      poll_success_key: "run.status"
      poll_success_values: "completed"
      poll_failure_values: "failed,cancelled"
      poll_attempts: "20"
      poll_interval_ms: "3000"
    secrets: inherit

  validate-production-schema:
    needs: deploy-production-env
    uses: ./.github/workflows/_validate_schema_layer.yml
    with:
      environment_name: production
      cf_env: ${{ needs.deploy-production-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-production-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-production-contracts:
    needs: deploy-production-env
    uses: ./.github/workflows/_validate_contracts_layer.yml
    with:
      environment_name: production
      control_plane_base_url: ${{ needs.deploy-production-env.outputs.control_plane_base_url }}
      cf_env: ${{ needs.deploy-production-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-production-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-production-policy:
    needs: deploy-production-env
    uses: ./.github/workflows/_validate_policy_layer.yml
    with:
      environment_name: production
      operator_agent_base_url: ${{ needs.deploy-production-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-production-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-production-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-production-scenarios:
    needs: deploy-production-env
    uses: ./.github/workflows/_validate_post_deploy.yml
    with:
      environment_name: production
      control_plane_base_url: ${{ needs.deploy-production-env.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-production-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-production-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-production-env.outputs.git_sha }}
      node_version: "20"
      execute_work_order_immediately: true
    secrets: inherit

  deploy-dashboard-pages:
    needs:
      - deploy-production-env
      - validate-production-environment
      - validate-production-schema
      - validate-production-contracts
      - validate-production-policy
      - validate-production-scenarios
    uses: ./.github/workflows/_deploy-dashboard-pages.yml
    with:
      environment_name: production
      control_plane_base_url: ${{ needs.deploy-production-env.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-production-env.outputs.operator_agent_url }}
      pages_project_name: aep-dashboard
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  final-summary:
    needs:
      - confirm
      - deploy-production-env
      - validate-production-environment
      - validate-production-schema
      - validate-production-contracts
      - validate-production-policy
      - validate-production-scenarios
      - deploy-dashboard-pages
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Production aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Confirmation: ${{ needs.confirm.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy environment: ${{ needs.deploy-production-env.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment layer: ${{ needs.validate-production-environment.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schema layer: ${{ needs.validate-production-schema.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Contracts layer: ${{ needs.validate-production-contracts.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Policy layer: ${{ needs.validate-production-policy.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.validate-production-scenarios.outputs.enabled }}" != "true" ]]; then
            echo "- Scenarios layer: skipped (warning: operator-agent base URL not configured for the production environment)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-scenarios.outputs.attention }}" == "true" ]]; then
            echo "- Scenarios layer: ${{ needs.validate-production-scenarios.outputs.outcome }} (attention: WARN/SKIP entries present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Scenarios layer: ${{ needs.validate-production-scenarios.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "- Dashboard deploy: ${{ needs.deploy-dashboard-pages.result }}" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.confirm.result }}" != "success" ]]; then
            echo "- ❌ Production deploy was not confirmed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-production-env.result }}" != "success" ]]; then
            echo "- ❌ Production deploy lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-environment.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Production environment deployed, but environment-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-schema.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Production environment and environment-layer checks passed, but schema-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-contracts.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Production environment, environment-layer, and schema-layer checks passed, but contracts-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-policy.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Production environment through contracts-layer checks passed, but policy-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-scenarios.outputs.enabled }}" == "true" && "${{ needs.validate-production-scenarios.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Production environment through policy-layer checks passed, but scenario-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-production-scenarios.outputs.attention }}" == "true" ]]; then
            echo "- ⚠️ Production deploy lane passed with scenario-layer warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-dashboard-pages.result }}" != "success" ]]; then
            echo "- ❌ Production validation layers passed, but dashboard deployment failed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Production deploy lane passed." >> "$GITHUB_STEP_SUMMARY"