name: _validate_operator_governance

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      control_plane_base_url:
        required: false
        type: string
      operator_agent_base_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      health_runtime_env:
        required: false
        type: string
        default: dev
      node_version:
        required: false
        type: string
        default: "20"
    outputs:
      enabled:
        description: "Whether operator-agent-dependent checks were enabled"
        value: ${{ jobs.validate-operator-governance.outputs.enabled }}
      outcome:
        description: "Overall outcome of the operator governance validation suite"
        value: ${{ jobs.validate-operator-governance.outputs.outcome }}
      attention:
        description: "Whether warning/skip attention signals were present"
        value: ${{ jobs.validate-operator-governance.outputs.attention }}

permissions:
  contents: read

jobs:
  validate-operator-governance:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      GIT_SHA: ${{ inputs.git_sha }}
      CONTROL_PLANE_BASE_URL_INPUT: ${{ inputs.control_plane_base_url }}
      OPERATOR_AGENT_BASE_URL_INPUT: ${{ inputs.operator_agent_base_url }}
      CF_ENV: ${{ inputs.cf_env }}
      HEALTH_RUNTIME_ENV: ${{ inputs.health_runtime_env }}

      CONTROL_PLANE_BASE_URL: ${{ vars.CONTROL_PLANE_BASE_URL }}
      OPERATOR_AGENT_BASE_URL: ${{ vars.OPERATOR_AGENT_BASE_URL }}

      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_OPERATOR_AGENT_BASE_URL: ${{ secrets.STAGING_OPERATOR_AGENT_BASE_URL }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      PRODUCTION_OPERATOR_AGENT_BASE_URL: ${{ secrets.PRODUCTION_OPERATOR_AGENT_BASE_URL }}
      ASYNC_VALIDATION_BASE_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL: ${{ secrets.ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL }}
    outputs:
      enabled: ${{ steps.capture.outputs.enabled }}
      outcome: ${{ steps.capture.outputs.outcome }}
      attention: ${{ steps.capture.outputs.attention }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective validation URLs
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_BASE_URL_SOURCE=$RESOLVED_CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL=$RESOLVED_OPERATOR_AGENT_BASE_URL" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL_SOURCE=$RESOLVED_OPERATOR_AGENT_BASE_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Check control-plane base URL configuration
        id: base_url_config
        run: |
          if [[ -n "$CONTROL_PLANE_BASE_URL" && "$CONTROL_PLANE_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$CONTROL_PLANE_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing CONTROL_PLANE_BASE_URL in _validate_operator_governance.yml." >&2
              echo "Resolution order is: input -> vars.CONTROL_PLANE_BASE_URL -> long-lived environment fallback." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid control_plane_base_url input: '$CONTROL_PLANE_BASE_URL'. Must be absolute." >&2
            fi
            exit 1
          fi

      - name: Control-plane health check
        id: health_check
        run: |
          npx tsx scripts/ci/checks/environment/check-health.ts \
            --url "$CONTROL_PLANE_BASE_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Check operator-agent configuration
        id: operator_agent_config
        run: |
          if [[ -n "$OPERATOR_AGENT_BASE_URL" && "$OPERATOR_AGENT_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$OPERATOR_AGENT_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Wait for operator-agent readiness
        id: wait_operator_agent
        if: steps.operator_agent_config.outputs.enabled == 'true'
        run: |
          npx tsx scripts/ci/checks/environment/wait-for-url.ts \
            --url "$OPERATOR_AGENT_BASE_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-operator-agent.log

      - name: Manager advisory
        id: manager_advisory
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:manager-advisory-check 2>&1 | tee manager-advisory.log

      - name: Manager policy overlay
        id: manager_policy_overlay
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:manager-policy-overlay-check 2>&1 | tee manager-policy-overlay.log

      - name: Escalation audit
        id: escalation_audit
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:escalation-audit-check 2>&1 | tee escalation-audit.log

      - name: Escalation lifecycle
        id: escalation_lifecycle
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:escalation-lifecycle-check 2>&1 | tee escalation-lifecycle.log

      - name: Approval state machine
        id: approval_state_machine
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:approval-state-machine-check 2>&1 | tee approval-state-machine.log

      - name: Paperclip first execution
        id: paperclip_first_execution
        if: steps.operator_agent_config.outputs.enabled == 'true' && steps.wait_operator_agent.outcome == 'success'
        run: |
          npm run ci:paperclip-first-execution-check 2>&1 | tee paperclip-first-execution.log

      - name: Capture outputs
        id: capture
        if: always()
        run: |
          collect_warnings() {
            local logs=(
              manager-advisory.log
              manager-policy-overlay.log
              escalation-audit.log
              escalation-lifecycle.log
              approval-state-machine.log
              paperclip-first-execution.log
            )
            local found=""

            for log_file in "${logs[@]}"; do
              if [[ -f "$log_file" ]]; then
                while IFS= read -r line; do
                  if [[ "$line" =~ ^\[(warn|skip)\] ]]; then
                    local cleaned="$line"
                    cleaned="${cleaned#\[warn\] }"
                    cleaned="${cleaned#\[skip\] }"
                    found+="$cleaned"
                    found+=$'\n'
                  fi
                done < "$log_file"
              fi
            done

            printf "%s" "$found"
          }

          ENABLED="${{ steps.operator_agent_config.outputs.enabled }}"
          ATTENTION="false"
          WARNINGS="$(collect_warnings)"

          if [[ -n "$WARNINGS" ]]; then
            ATTENTION="true"
          fi

          OUTCOME="success"

          if [[ "${{ steps.base_url_config.outcome }}" != "success" || "${{ steps.health_check.outcome }}" != "success" ]]; then
            OUTCOME="failure"
          elif [[ "$ENABLED" == "true" && "${{ steps.wait_operator_agent.outcome }}" != "success" ]]; then
            OUTCOME="failure"
          elif [[ "$ENABLED" == "true" && (
              "${{ steps.manager_advisory.outcome }}" != "success" ||
              "${{ steps.manager_policy_overlay.outcome }}" != "success" ||
              "${{ steps.escalation_audit.outcome }}" != "success" ||
              "${{ steps.escalation_lifecycle.outcome }}" != "success" ||
              "${{ steps.approval_state_machine.outcome }}" != "success" ||
              "${{ steps.paperclip_first_execution.outcome }}" != "success"
            ) ]]; then
            OUTCOME="failure"
          fi

          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
          echo "attention=$ATTENTION" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          collect_operator_warnings() {
            local logs=(
              manager-advisory.log
              manager-policy-overlay.log
              escalation-audit.log
              escalation-lifecycle.log
              approval-state-machine.log
              paperclip-first-execution.log
            )
            local found=""

            for log_file in "${logs[@]}"; do
              if [[ -f "$log_file" ]]; then
                while IFS= read -r line; do
                  if [[ "$line" =~ ^\[(warn|skip)\] ]]; then
                    local cleaned="$line"
                    cleaned="${cleaned#\[warn\] }"
                    cleaned="${cleaned#\[skip\] }"
                    found+="$cleaned"
                    found+=$'\n'
                  fi
                done < "$log_file"
              fi
            done

            printf "%s" "$found"
          }

          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          BASE_URL_CONFIG_OUTCOME="${{ steps.base_url_config.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          OPERATOR_AGENT_READINESS_OUTCOME="${{ steps.wait_operator_agent.outcome }}"
          MANAGER_ADVISORY_OUTCOME="${{ steps.manager_advisory.outcome }}"
          MANAGER_POLICY_OVERLAY_OUTCOME="${{ steps.manager_policy_overlay.outcome }}"
          ESCALATION_AUDIT_OUTCOME="${{ steps.escalation_audit.outcome }}"
          ESCALATION_LIFECYCLE_OUTCOME="${{ steps.escalation_lifecycle.outcome }}"
          APPROVAL_STATE_MACHINE_OUTCOME="${{ steps.approval_state_machine.outcome }}"
          PAPERCLIP_FIRST_EXECUTION_OUTCOME="${{ steps.paperclip_first_execution.outcome }}"
          OPERATOR_WARNINGS="$(collect_operator_warnings)"
          HAS_OPERATOR_WARNINGS="false"
          if [[ -n "$OPERATOR_WARNINGS" ]]; then
            HAS_OPERATOR_WARNINGS="true"
          fi

          echo "## Operator governance validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $CONTROL_PLANE_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
            echo "- Operator-agent URL: $OPERATOR_AGENT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$BASE_URL_CONFIG_OUTCOME") Control-plane base URL config: $BASE_URL_CONFIG_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Control-plane health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$OPERATOR_AGENT_READINESS_OUTCOME") Operator-agent readiness: $OPERATOR_AGENT_READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Manager reasoning and policy" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MANAGER_ADVISORY_OUTCOME") Manager advisory: $MANAGER_ADVISORY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MANAGER_POLICY_OVERLAY_OUTCOME") Manager policy overlay: $MANAGER_POLICY_OVERLAY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Escalation semantics and audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$ESCALATION_AUDIT_OUTCOME") Escalation audit: $ESCALATION_AUDIT_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$ESCALATION_LIFECYCLE_OUTCOME") Escalation lifecycle: $ESCALATION_LIFECYCLE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Approval state machine and execution" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$APPROVAL_STATE_MACHINE_OUTCOME") Approval state machine: $APPROVAL_STATE_MACHINE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$PAPERCLIP_FIRST_EXECUTION_OUTCOME") Paperclip first execution: $PAPERCLIP_FIRST_EXECUTION_OUTCOME" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" != "true" ]]; then
            if [[ "${{ steps.operator_agent_config.outputs.reason }}" == "missing" ]]; then
              echo "- ⚪ Operator-agent checks skipped: operator_agent_base_url is not configured." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚪ Operator-agent checks skipped: operator_agent_base_url is invalid (must be absolute, e.g. https://...)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [[ "$HAS_OPERATOR_WARNINGS" == "true" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Warning signals" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r warning_line; do
              [[ -z "$warning_line" ]] && continue
              echo "- ⚠️ $warning_line" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$OPERATOR_WARNINGS"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$BASE_URL_CONFIG_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            echo "- Control-plane preflight failed. Start with base URL and /healthz before investigating governance logic." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && "$OPERATOR_AGENT_READINESS_OUTCOME" != "success" ]]; then
            echo "- Operator-agent readiness failed. Inspect operator-agent /healthz and environment wiring." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$MANAGER_ADVISORY_OUTCOME" != "success" || "$MANAGER_POLICY_OVERLAY_OUTCOME" != "success" ]]; then
            echo "- Manager reasoning or policy overlay failed. Inspect manager_cron, decision emission, and policy application logic." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$ESCALATION_AUDIT_OUTCOME" != "success" || "$ESCALATION_LIFECYCLE_OUTCOME" != "success" ]]; then
            echo "- Escalation semantics or audit trail failed. Inspect escalation creation, state transitions, and provenance tracking." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$APPROVAL_STATE_MACHINE_OUTCOME" != "success" ]]; then
            echo "- Approval state machine validation failed. Inspect approval endpoints, state transitions, and control history linkage." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$PAPERCLIP_FIRST_EXECUTION_OUTCOME" != "success" ]]; then
            echo "- Paperclip first execution failed. Inspect approval-gated execution flow and provenance propagation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Operator governance suite passed." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Overall verdict" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.capture.outputs.outcome }}" == "success" ]]; then
            if [[ "$HAS_OPERATOR_WARNINGS" == "true" ]]; then
              echo "- ⚠️ Operator governance validation passed with warnings." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ✅ Operator governance validation passed." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- ❌ Operator governance validation failed." >> "$GITHUB_STEP_SUMMARY"
          fi
