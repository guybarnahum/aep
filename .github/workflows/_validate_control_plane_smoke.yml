name: _validate_control_plane_smoke

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      deploy_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      smoke_method:
        required: false
        type: string
        default: "POST"
      smoke_path:
        required: false
        type: string
        default: "/workflow/start"
      smoke_payload:
        required: false
        type: string
        default: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status:
        required: false
        type: string
        default: "202"
      expect_json_key:
        required: false
        type: string
        default: "workflow_run_id"
      poll_path_template:
        required: false
        type: string
        default: "/workflow/{id}"
      poll_id_key:
        required: false
        type: string
        default: "workflow_run_id"
      poll_success_key:
        required: false
        type: string
        default: "run.status"
      poll_success_values:
        required: false
        type: string
        default: "completed"
      poll_failure_values:
        required: false
        type: string
        default: "failed,cancelled"
      poll_attempts:
        required: false
        type: string
        default: "20"
      poll_interval_ms:
        required: false
        type: string
        default: "3000"
    outputs:
      outcome:
        description: "Outcome of the smoke validation job"
        value: ${{ jobs.validate-control-plane-smoke.outputs.outcome }}

permissions:
  contents: read

jobs:
  validate-control-plane-smoke:
    uses: ./.github/workflows/_validate_environment_layer.yml
    with:
      environment_name: ${{ inputs.environment_name }}
      deploy_url: ${{ inputs.deploy_url }}
      cf_env: ${{ inputs.cf_env }}
      git_sha: ${{ inputs.git_sha }}
      node_version: ${{ inputs.node_version }}
      smoke_method: ${{ inputs.smoke_method }}
      smoke_path: ${{ inputs.smoke_path }}
      smoke_payload: ${{ inputs.smoke_payload }}
      expect_status: ${{ inputs.expect_status }}
      expect_json_key: ${{ inputs.expect_json_key }}
      poll_path_template: ${{ inputs.poll_path_template }}
      poll_id_key: ${{ inputs.poll_id_key }}
      poll_success_key: ${{ inputs.poll_success_key }}
      poll_success_values: ${{ inputs.poll_success_values }}
      poll_failure_values: ${{ inputs.poll_failure_values }}
      poll_attempts: ${{ inputs.poll_attempts }}
      poll_interval_ms: ${{ inputs.poll_interval_ms }}
    secrets: inherit