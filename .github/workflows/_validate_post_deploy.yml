name: _validate_post_deploy

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      control_plane_base_url:
        required: false
        type: string
      operator_agent_base_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      execute_work_order_immediately:
        required: false
        type: boolean
        default: false
    outputs:
      enabled:
        description: "Whether post-deploy validation was enabled"
        value: ${{ jobs.validate-post-deploy.outputs.enabled }}
      outcome:
        description: "Outcome of post-deploy validation or skipped"
        value: ${{ jobs.validate-post-deploy.outputs.outcome }}
      attention:
        description: "Whether WARN/SKIP attention lines were present"
        value: ${{ jobs.validate-post-deploy.outputs.attention }}

permissions:
  contents: read

jobs:
  validate-post-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CONTROL_PLANE_BASE_URL: ${{ vars.CONTROL_PLANE_BASE_URL }}
      CONTROL_PLANE_BASE_URL_INPUT: ${{ inputs.control_plane_base_url }}
      OPERATOR_AGENT_BASE_URL: ${{ vars.OPERATOR_AGENT_BASE_URL }}
      OPERATOR_AGENT_BASE_URL_INPUT: ${{ inputs.operator_agent_base_url }}
      CF_ENV: ${{ inputs.cf_env }}
      GIT_SHA: ${{ inputs.git_sha }}

    outputs:
      enabled: ${{ steps.capture.outputs.enabled }}
      outcome: ${{ steps.capture.outputs.outcome }}
      attention: ${{ steps.capture.outputs.attention }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective validation URLs
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_BASE_URL_SOURCE=$RESOLVED_CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL=$RESOLVED_OPERATOR_AGENT_BASE_URL" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL_SOURCE=$RESOLVED_OPERATOR_AGENT_BASE_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Check validation configuration
        id: config
        run: |
          if [[ -n "$OPERATOR_AGENT_BASE_URL" && "$OPERATOR_AGENT_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$OPERATOR_AGENT_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing OPERATOR_AGENT_BASE_URL in _validate_post_deploy.yml." >&2
              echo "Resolution order is: input -> vars.OPERATOR_AGENT_BASE_URL -> long-lived environment fallback." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid OPERATOR_AGENT_BASE_URL in _validate_post_deploy.yml. Must be absolute, e.g. https://... ." >&2
            fi
          fi

      - name: Initialize post-deploy log
        if: steps.config.outputs.enabled == 'true'
        run: |
          : > post-deploy-validation.log

      - name: Operator surface check
        id: operator_surface_check
        if: steps.config.outputs.enabled == 'true'
        run: |
          npx tsx scripts/ci/checks/contracts/operator-surface-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Scheduled routing check
        id: scheduled_routing_check
        if: steps.config.outputs.enabled == 'true' && steps.operator_surface_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/policy/scheduled-routing-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Paperclip first execution check
        id: paperclip_first_execution_check
        if: steps.config.outputs.enabled == 'true' && steps.scheduled_routing_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/paperclip-first-execution-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Team work loop check
        id: team_work_loop_check
        if: steps.config.outputs.enabled == 'true' && steps.paperclip_first_execution_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/team-work-loop-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Intake/project flow check
        id: intake_project_flow
        if: steps.config.outputs.enabled == 'true' && steps.team_work_loop_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/intake-project-flow-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Dispatch validation runs
        id: dispatch_validation_runs
        if: steps.config.outputs.enabled == 'true' && steps.intake_project_flow.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/dispatch-validation-runs.ts \
            --base-url "$CONTROL_PLANE_BASE_URL" \
            --mode full \
            --requested-by post_deploy_validation 2>&1 | tee -a post-deploy-validation.log

          DISPATCH_BATCH_ID=$(sed -n 's/^DISPATCH_BATCH_ID=//p' post-deploy-validation.log | tail -n 1)
          if [[ -n "$DISPATCH_BATCH_ID" ]]; then
            echo "dispatch_batch_id=$DISPATCH_BATCH_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Execute validation dispatch
        id: post_deploy_validation
        if: steps.config.outputs.enabled == 'true' && steps.dispatch_validation_runs.outcome == 'success'
        run: |
          VALIDATION_TARGET_URL="${CONTROL_PLANE_BASE_URL%/}/healthz"
          if ! npx tsx scripts/ci/checks/scenarios/execute-validation-dispatch.ts "$OPERATOR_AGENT_BASE_URL" "$VALIDATION_TARGET_URL" 2>&1 | tee -a post-deploy-validation.log; then
            echo "Validation dispatch failed before returning a work order." >&2
            exit 1
          fi

          TASK_ID=$(sed -n 's/^TASK_ID=//p' post-deploy-validation.log | tail -n 1)

          if [[ -z "$TASK_ID" ]]; then
            echo "Failed to capture TASK_ID from validation dispatch output." >&2
            exit 1
          fi

          echo "AEP validation task: $TASK_ID" | tee -a post-deploy-validation.log
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"

          if [[ "${{ inputs.execute_work_order_immediately }}" == "true" ]]; then
            npx tsx scripts/ci/checks/scenarios/execute-validation-work-order.ts "$OPERATOR_AGENT_BASE_URL" "$TASK_ID" 2>&1 | tee -a post-deploy-validation.log
          fi

      - name: Check validation verdict
        id: validation_verdict_check
        if: steps.config.outputs.enabled == 'true' && steps.post_deploy_validation.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/check-validation-verdict.ts "$OPERATOR_AGENT_BASE_URL" "${{ steps.post_deploy_validation.outputs.task_id }}" 2>&1 | tee -a post-deploy-validation.log

      - name: Validation policy check
        id: validation_policy_check
        if: steps.config.outputs.enabled == 'true' && steps.validation_verdict_check.outcome == 'success'
        run: |
          DISPATCH_BATCH_ARG=()
          if [[ -n "${{ steps.dispatch_validation_runs.outputs.dispatch_batch_id }}" ]]; then
            DISPATCH_BATCH_ARG=(--dispatch-batch-id "${{ steps.dispatch_validation_runs.outputs.dispatch_batch_id }}")
          fi

          npx tsx scripts/ci/checks/policy/check-validation-policy.ts \
            --base-url "$CONTROL_PLANE_BASE_URL" \
            --freshness-minutes 30 \
            "${DISPATCH_BATCH_ARG[@]}" 2>&1 | tee -a post-deploy-validation.log

      - name: Run thread delegation scenarios
        id: thread_delegation_scenarios
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/approval-thread-delegation-check.ts 2>&1 | tee -a post-deploy-validation.log
          npx tsx scripts/ci/checks/scenarios/escalation-thread-delegation-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Repeated validation persona continuity check
        id: repeated_validation_persona_continuity
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/repeated-validation-persona-continuity-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Task reassignment continuity check
        id: task_reassignment_continuity
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_CONFIG_PATH: core/operator-agent/wrangler.jsonc
          WRANGLER_D1_EXECUTION_LOCATION: remote
          D1_DATABASE_REF: OPERATOR_AGENT_DB
        run: |
          npx tsx scripts/ci/checks/scenarios/task-reassignment-continuity-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Validation loop feedback check
        id: validation_loop_feedback
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/validation-loop-feedback-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Human visibility summary check
        id: human_visibility_summary
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/human-visibility-summary-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Repeated PM persona continuity check
        id: repeated_pm_persona_continuity
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/repeated-pm-persona-continuity-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Org resolver planning defaults check
        id: org_resolver_planning_defaults
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/org-resolver-planning-defaults-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External-style message idempotency check
        id: external_style_message_idempotency
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-style-message-idempotency-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External-style message order tolerance check
        id: external_style_message_order_tolerance
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-style-message-order-tolerance-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Mirror routing contract check
        id: mirror_routing_contract
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/contracts/mirror-routing-contract-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Agent message mirroring check
        id: agent_message_mirroring
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/agent-message-mirroring-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External thread mapping contract check
        id: external_thread_mapping_contract
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/contracts/external-thread-mapping-contract-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Threaded mirror continuity check
        id: threaded_mirror_continuity
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/threaded-mirror-continuity-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Inbound reply correlation contract check
        id: inbound_reply_correlation_contract
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/contracts/inbound-reply-correlation-contract-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Inbound reply ingestion check
        id: inbound_reply_ingestion
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/inbound-reply-ingestion-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Inbound duplicate delivery check
        id: inbound_duplicate_delivery
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/inbound-duplicate-delivery-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External action contract check
        id: external_action_contract
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/contracts/external-action-contract-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External approval action check
        id: external_approval_action
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-approval-action-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External escalation action check
        id: external_escalation_action
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-escalation-action-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External action idempotency check
        id: external_action_idempotency
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-action-idempotency-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External interaction policy contract check
        id: external_interaction_policy_contract
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/contracts/external-interaction-policy-contract-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External reply policy enforcement check
        id: external_reply_policy_enforcement
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-reply-policy-enforcement-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: External action policy enforcement check
        id: external_action_policy_enforcement
        if: steps.config.outputs.enabled == 'true' && steps.validation_policy_check.outcome == 'success'
        run: |
          npx tsx scripts/ci/checks/scenarios/external-action-policy-enforcement-check.ts 2>&1 | tee -a post-deploy-validation.log

      - name: Capture outputs
        id: capture
        if: always()
        run: |
          ENABLED="${{ steps.config.outputs.enabled }}"
          OUTCOME="skipped"
          ATTENTION="false"

          if [[ "$ENABLED" == "true" ]]; then
            if [[ \
              "${{ steps.operator_surface_check.outcome }}" == "success" && \
              "${{ steps.scheduled_routing_check.outcome }}" == "success" && \
              "${{ steps.paperclip_first_execution_check.outcome }}" == "success" && \
              "${{ steps.team_work_loop_check.outcome }}" == "success" && \
              "${{ steps.intake_project_flow.outcome }}" == "success" && \
              "${{ steps.dispatch_validation_runs.outcome }}" == "success" && \
              "${{ steps.post_deploy_validation.outcome }}" == "success" && \
              "${{ steps.validation_verdict_check.outcome }}" == "success" && \
              "${{ steps.validation_policy_check.outcome }}" == "success" && \
              ( "${{ steps.thread_delegation_scenarios.outcome }}" == "success" || "${{ steps.thread_delegation_scenarios.outcome }}" == "skipped" ) && \
              ( "${{ steps.repeated_validation_persona_continuity.outcome }}" == "success" || "${{ steps.repeated_validation_persona_continuity.outcome }}" == "skipped" ) && \
              ( "${{ steps.validation_loop_feedback.outcome }}" == "success" || "${{ steps.validation_loop_feedback.outcome }}" == "skipped" ) && \
              ( "${{ steps.human_visibility_summary.outcome }}" == "success" || "${{ steps.human_visibility_summary.outcome }}" == "skipped" ) && \
              ( "${{ steps.repeated_pm_persona_continuity.outcome }}" == "success" || "${{ steps.repeated_pm_persona_continuity.outcome }}" == "skipped" ) && \
              ( "${{ steps.org_resolver_planning_defaults.outcome }}" == "success" || "${{ steps.org_resolver_planning_defaults.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_style_message_idempotency.outcome }}" == "success" || "${{ steps.external_style_message_idempotency.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_style_message_order_tolerance.outcome }}" == "success" || "${{ steps.external_style_message_order_tolerance.outcome }}" == "skipped" ) && \
              ( "${{ steps.mirror_routing_contract.outcome }}" == "success" || "${{ steps.mirror_routing_contract.outcome }}" == "skipped" ) && \
              ( "${{ steps.agent_message_mirroring.outcome }}" == "success" || "${{ steps.agent_message_mirroring.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_thread_mapping_contract.outcome }}" == "success" || "${{ steps.external_thread_mapping_contract.outcome }}" == "skipped" ) && \
              ( "${{ steps.threaded_mirror_continuity.outcome }}" == "success" || "${{ steps.threaded_mirror_continuity.outcome }}" == "skipped" ) && \
              ( "${{ steps.inbound_reply_correlation_contract.outcome }}" == "success" || "${{ steps.inbound_reply_correlation_contract.outcome }}" == "skipped" ) && \
              ( "${{ steps.inbound_reply_ingestion.outcome }}" == "success" || "${{ steps.inbound_reply_ingestion.outcome }}" == "skipped" ) && \
              ( "${{ steps.inbound_duplicate_delivery.outcome }}" == "success" || "${{ steps.inbound_duplicate_delivery.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_action_contract.outcome }}" == "success" || "${{ steps.external_action_contract.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_approval_action.outcome }}" == "success" || "${{ steps.external_approval_action.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_escalation_action.outcome }}" == "success" || "${{ steps.external_escalation_action.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_action_idempotency.outcome }}" == "success" || "${{ steps.external_action_idempotency.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_interaction_policy_contract.outcome }}" == "success" || "${{ steps.external_interaction_policy_contract.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_reply_policy_enforcement.outcome }}" == "success" || "${{ steps.external_reply_policy_enforcement.outcome }}" == "skipped" ) && \
              ( "${{ steps.external_action_policy_enforcement.outcome }}" == "success" || "${{ steps.external_action_policy_enforcement.outcome }}" == "skipped" ) \
            ]]; then
              OUTCOME="success"
            else
              OUTCOME="failure"
            fi

            if [[ -f post-deploy-validation.log ]] && grep -Eq '^- (WARN|SKIP): ' post-deploy-validation.log; then
              ATTENTION="true"
            fi
          fi

          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
          echo "attention=$ATTENTION" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          emit_check() {
            local label="$1"
            local outcome="$2"
            echo "- $(status_emoji "$outcome") $label: $outcome" >> "$GITHUB_STEP_SUMMARY"
          }

          ENABLED="${{ steps.capture.outputs.enabled }}"
          OUTCOME="${{ steps.capture.outputs.outcome }}"
          ATTENTION="${{ steps.capture.outputs.attention }}"

          echo "## Post-deploy validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- Layer: scenarios" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL: $CONTROL_PLANE_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-planeURL source: $CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operator-agent URL source: $OPERATOR_AGENT_BASE_URL_SOURCE" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ENABLED" != "true" ]]; then
            echo "### Configuration" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${{ steps.config.outputs.reason }}" == "missing" ]]; then
              echo "- ⚪ Post-deploy validation skipped: operator-agent base URL could not be resolved for this environment." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚪ Post-deploy validation skipped: operator-agent base URL was invalid." >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Authoritative Core Sequence" >> "$GITHUB_STEP_SUMMARY"
          emit_check "operator surface check" "${{ steps.operator_surface_check.outcome }}"
          emit_check "scheduled routing check" "${{ steps.scheduled_routing_check.outcome }}"
          emit_check "paperclip first execution check" "${{ steps.paperclip_first_execution_check.outcome }}"
          emit_check "team work loop check" "${{ steps.team_work_loop_check.outcome }}"
          emit_check "intake/project flow check" "${{ steps.intake_project_flow.outcome }}"
          emit_check "dispatch validation runs" "${{ steps.dispatch_validation_runs.outcome }}"
          emit_check "execute validation dispatch" "${{ steps.post_deploy_validation.outcome }}"
          emit_check "validation verdict check" "${{ steps.validation_verdict_check.outcome }}"
          emit_check "validation policy check" "${{ steps.validation_policy_check.outcome }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Downstream Continuity And Planning" >> "$GITHUB_STEP_SUMMARY"
          emit_check "thread delegation scenarios" "${{ steps.thread_delegation_scenarios.outcome }}"
          emit_check "repeated validation persona continuity check" "${{ steps.repeated_validation_persona_continuity.outcome }}"
          emit_check "task reassignment continuity check" "${{ steps.task_reassignment_continuity.outcome }}"
          emit_check "validation loop feedback check" "${{ steps.validation_loop_feedback.outcome }}"
          emit_check "human visibility summary check" "${{ steps.human_visibility_summary.outcome }}"
          emit_check "repeated PM persona continuity check" "${{ steps.repeated_pm_persona_continuity.outcome }}"
          emit_check "org resolver planning defaults check" "${{ steps.org_resolver_planning_defaults.outcome }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Downstream Messaging And Mirror Contracts" >> "$GITHUB_STEP_SUMMARY"
          emit_check "external-style message idempotency check" "${{ steps.external_style_message_idempotency.outcome }}"
          emit_check "external-style message order tolerance check" "${{ steps.external_style_message_order_tolerance.outcome }}"
          emit_check "mirror routing contract check" "${{ steps.mirror_routing_contract.outcome }}"
          emit_check "agent message mirroring check" "${{ steps.agent_message_mirroring.outcome }}"
          emit_check "external thread mapping contract check" "${{ steps.external_thread_mapping_contract.outcome }}"
          emit_check "threaded mirror continuity check" "${{ steps.threaded_mirror_continuity.outcome }}"
          emit_check "inbound reply correlation contract check" "${{ steps.inbound_reply_correlation_contract.outcome }}"
          emit_check "inbound reply ingestion check" "${{ steps.inbound_reply_ingestion.outcome }}"
          emit_check "inbound duplicate delivery check" "${{ steps.inbound_duplicate_delivery.outcome }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Downstream External Action And Policy" >> "$GITHUB_STEP_SUMMARY"
          emit_check "external action contract check" "${{ steps.external_action_contract.outcome }}"
          emit_check "external approval action check" "${{ steps.external_approval_action.outcome }}"
          emit_check "external escalation action check" "${{ steps.external_escalation_action.outcome }}"
          emit_check "external action idempotency check" "${{ steps.external_action_idempotency.outcome }}"
          emit_check "external interaction policy contract check" "${{ steps.external_interaction_policy_contract.outcome }}"
          emit_check "external reply policy enforcement check" "${{ steps.external_reply_policy_enforcement.outcome }}"
          emit_check "external action policy enforcement check" "${{ steps.external_action_policy_enforcement.outcome }}"

          echo "### Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$OUTCOME") Post-deploy validation: $OUTCOME" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f post-deploy-validation.log ]]; then
            ATTENTION_LINES="$(grep -E '^- (WARN|SKIP): ' post-deploy-validation.log || true)"
            DETAIL_LINES="$(grep -E '^- (WARN|SKIP|PASS|FAIL): ' post-deploy-validation.log || true)"

            if [[ -n "$ATTENTION_LINES" ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Validation attention" >> "$GITHUB_STEP_SUMMARY"
              while IFS= read -r line; do
                [[ -z "$line" ]] && continue
                echo "- **${line}**" >> "$GITHUB_STEP_SUMMARY"
              done <<< "$ATTENTION_LINES"
            fi

            if [[ -n "$DETAIL_LINES" ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Validation details" >> "$GITHUB_STEP_SUMMARY"
              while IFS= read -r line; do
                [[ -z "$line" ]] && continue
                echo "$line" >> "$GITHUB_STEP_SUMMARY"
              done <<< "$DETAIL_LINES"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$OUTCOME" != "success" ]]; then
            echo "- Post-deploy validation failed. Inspect post-deploy-validation.log in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$ATTENTION" == "true" ]]; then
            echo "- Post-deploy validation passed with warning/skip attention signals. Review the attention lines above." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Post-deploy validation passed." >> "$GITHUB_STEP_SUMMARY"
          fi
