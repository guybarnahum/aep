name: Validate Async Environment

on:
  workflow_dispatch:
    inputs:
      run_runtime_read_safety:
        description: "Run runtime read safety validation"
        required: false
        type: boolean
        default: true
      run_operator_surface:
        description: "Run operator surface validation"
        required: false
        type: boolean
        default: true
      run_operator_governance:
        description: "Run operator governance validation"
        required: false
        type: boolean
        default: true
      run_contracts_layer:
        description: "Run contracts-layer validation including synthetic employee mutation checks"
        required: false
        type: boolean
        default: true
      run_paperclip_handoff:
        description: "Run Paperclip handoff validation"
        required: false
        type: boolean
        default: true

concurrency:
  group: env-async-validation
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run test:backend

      - run: npm test

  reset-async-validation-state:
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: async-validation
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      CF_ENV: async_validation
      OPERATOR_AGENT_WRANGLER_CONFIG: core/operator-agent/wrangler.jsonc
      OPERATOR_AGENT_D1_DATABASE_NAME: aep-operator-agent-async-validation
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Reset async-validation operator-agent D1 runtime data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/reset-async-validation-d1.sh

  deploy-async-environment:
    needs:
      - preflight
      - reset-async-validation-state
    uses: ./.github/workflows/_deploy_environment.yml
    with:
      environment_name: async-validation
      cf_env: async_validation
      git_sha: ${{ github.sha }}
      health_runtime_env: dev
      wrangler_config: core/control-plane/wrangler.jsonc
      d1_database_name: aep-async-validation
      deploy_operator_agent: true
      operator_agent_wrangler_config: core/operator-agent/wrangler.jsonc
      operator_agent_d1_database_name: aep-operator-agent-async-validation
      enable_test_endpoints: "true"
      insecure_allow_version_mismatch: false
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  validate-runtime-read-safety:
    needs: deploy-async-environment
    if: ${{ inputs.run_runtime_read_safety }}
    uses: ./.github/workflows/_validate_runtime_read_safety.yml
    with:
      environment_name: async-validation
      control_plane_base_url: ${{ needs.deploy-async-environment.outputs.control_plane_base_url }}
      cf_env: ${{ needs.deploy-async-environment.outputs.cf_env }}
      git_sha: ${{ needs.deploy-async-environment.outputs.git_sha }}
      health_runtime_env: dev
      node_version: "20"
    secrets: inherit

  validate-operator-surface:
    needs:
      - deploy-async-environment
      - validate-runtime-read-safety
    if: ${{ always() && inputs.run_operator_surface && needs.deploy-async-environment.result == 'success' && (needs.validate-runtime-read-safety.result == 'success' || needs.validate-runtime-read-safety.result == 'skipped') }}
    uses: ./.github/workflows/_validate_operator_surface.yml
    with:
      environment_name: async-validation
      control_plane_base_url: ${{ needs.deploy-async-environment.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-async-environment.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-async-environment.outputs.cf_env }}
      git_sha: ${{ needs.deploy-async-environment.outputs.git_sha }}
      health_runtime_env: dev
      node_version: "20"
    secrets: inherit

  validate-operator-governance:
    needs:
      - deploy-async-environment
      - validate-runtime-read-safety
      - validate-operator-surface
    if: ${{ always() && inputs.run_operator_governance && needs.deploy-async-environment.result == 'success' && (needs.validate-runtime-read-safety.result == 'success' || needs.validate-runtime-read-safety.result == 'skipped') && (needs.validate-operator-surface.result == 'success' || needs.validate-operator-surface.result == 'skipped') }}
    uses: ./.github/workflows/_validate_operator_governance.yml
    with:
      environment_name: async-validation
      control_plane_base_url: ${{ needs.deploy-async-environment.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-async-environment.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-async-environment.outputs.cf_env }}
      git_sha: ${{ needs.deploy-async-environment.outputs.git_sha }}
      health_runtime_env: dev
      node_version: "20"
    secrets: inherit

  validate-async-contracts:
    needs:
      - deploy-async-environment
      - validate-runtime-read-safety
    if: ${{ always() && inputs.run_contracts_layer && needs.deploy-async-environment.result == 'success' && (needs.validate-runtime-read-safety.result == 'success' || needs.validate-runtime-read-safety.result == 'skipped') }}
    uses: ./.github/workflows/_validate_contracts_layer.yml
    with:
      environment_name: async-validation
      control_plane_base_url: ${{ needs.deploy-async-environment.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-async-environment.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-async-environment.outputs.cf_env }}
      git_sha: ${{ needs.deploy-async-environment.outputs.git_sha }}
      node_version: "20"
      enable_synthetic_employee_mutation_checks: true
      enable_runtime_role_policy_mutation_checks: true
    secrets: inherit

  validate-paperclip-handoff:
    needs:
      - deploy-async-environment
      - validate-runtime-read-safety
      - validate-operator-governance
      - validate-async-contracts
    if: ${{ always() && inputs.run_paperclip_handoff && needs.deploy-async-environment.result == 'success' && (needs.validate-runtime-read-safety.result == 'success' || needs.validate-runtime-read-safety.result == 'skipped') && (needs.validate-operator-governance.result == 'success' || needs.validate-operator-governance.result == 'skipped') && (needs.validate-async-contracts.result == 'success' || needs.validate-async-contracts.result == 'skipped') }}
    uses: ./.github/workflows/_validate_paperclip_handoff.yml
    with:
      environment_name: async-validation
      control_plane_base_url: ${{ needs.deploy-async-environment.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-async-environment.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-async-environment.outputs.cf_env }}
      git_sha: ${{ needs.deploy-async-environment.outputs.git_sha }}
      health_runtime_env: dev
      node_version: "20"
    secrets: inherit

  final-summary:
    needs:
      - preflight
      - reset-async-validation-state
      - deploy-async-environment
      - validate-runtime-read-safety
      - validate-operator-surface
      - validate-operator-governance
      - validate-async-contracts
      - validate-paperclip-handoff
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Async validation aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preflight: ${{ needs.preflight.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Async-validation reset: ${{ needs.reset-async-validation-state.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment deploy: ${{ needs.deploy-async-environment.result }}" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ inputs.run_runtime_read_safety }}" == "true" ]]; then
            echo "- Runtime read safety: ${{ needs.validate-runtime-read-safety.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Runtime read safety: skipped by dispatch input" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ inputs.run_operator_surface }}" == "true" ]]; then
            if [[ "${{ needs.validate-operator-surface.outputs.enabled }}" != "true" && "${{ needs.validate-operator-surface.result }}" == "success" ]]; then
              echo "- Operator surface: ${{ needs.validate-operator-surface.outputs.outcome }} (operator-agent-dependent checks skipped by config)" >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ needs.validate-operator-surface.outputs.attention }}" == "true" ]]; then
              echo "- Operator surface: ${{ needs.validate-operator-surface.outputs.outcome }} (attention: warning/skip entries present)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- Operator surface: ${{ needs.validate-operator-surface.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- Operator surface: skipped by dispatch input" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ inputs.run_operator_governance }}" == "true" ]]; then
            if [[ "${{ needs.validate-operator-governance.outputs.enabled }}" != "true" && "${{ needs.validate-operator-governance.result }}" == "success" ]]; then
              echo "- Operator governance: ${{ needs.validate-operator-governance.outputs.outcome }} (operator-agent-dependent checks skipped by config)" >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ needs.validate-operator-governance.outputs.attention }}" == "true" ]]; then
              echo "- Operator governance: ${{ needs.validate-operator-governance.outputs.outcome }} (attention: warning/skip entries present)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- Operator governance: ${{ needs.validate-operator-governance.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- Operator governance: skipped by dispatch input" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ inputs.run_contracts_layer }}" == "true" ]]; then
            echo "- Contracts layer: ${{ needs.validate-async-contracts.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Contracts layer: skipped by dispatch input" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ inputs.run_paperclip_handoff }}" == "true" ]]; then
            if [[ "${{ needs.validate-paperclip-handoff.outputs.enabled }}" != "true" && "${{ needs.validate-paperclip-handoff.result }}" == "success" ]]; then
              echo "- Paperclip handoff: ${{ needs.validate-paperclip-handoff.outputs.outcome }} (operator-agent-dependent checks skipped by config)" >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ needs.validate-paperclip-handoff.outputs.attention }}" == "true" ]]; then
              echo "- Paperclip handoff: ${{ needs.validate-paperclip-handoff.outputs.outcome }} (attention: warning/skip entries present)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- Paperclip handoff: ${{ needs.validate-paperclip-handoff.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- Paperclip handoff: skipped by dispatch input" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.preflight.result }}" != "success" ]]; then
            echo "- ❌ Async validation lane failed during preflight validation." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ "${{ needs.reset-async-validation-state.result }}" != "success" ]]; then
            echo "- ❌ Async validation lane failed during async-validation state reset." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ "${{ needs.deploy-async-environment.result }}" != "success" ]]; then
            echo "- ❌ Async validation lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FAILED="false"
          ATTENTION="false"

          if [[ "${{ inputs.run_runtime_read_safety }}" == "true" ]]; then
            if [[ "${{ needs.validate-runtime-read-safety.outputs.outcome }}" != "success" ]]; then
              FAILED="true"
            fi
          fi

          if [[ "${{ inputs.run_operator_surface }}" == "true" ]]; then
            if [[ "${{ needs.validate-operator-surface.outputs.outcome }}" != "success" ]]; then
              FAILED="true"
            fi
            if [[ "${{ needs.validate-operator-surface.outputs.attention }}" == "true" ]]; then
              ATTENTION="true"
            fi
          fi

          if [[ "${{ inputs.run_operator_governance }}" == "true" ]]; then
            if [[ "${{ needs.validate-operator-governance.outputs.outcome }}" != "success" ]]; then
              FAILED="true"
            fi
            if [[ "${{ needs.validate-operator-governance.outputs.attention }}" == "true" ]]; then
              ATTENTION="true"
            fi
          fi

          if [[ "${{ inputs.run_contracts_layer }}" == "true" ]]; then
            if [[ "${{ needs.validate-async-contracts.outputs.outcome }}" != "success" ]]; then
              FAILED="true"
            fi
          fi

          if [[ "${{ inputs.run_paperclip_handoff }}" == "true" ]]; then
            if [[ "${{ needs.validate-paperclip-handoff.outputs.outcome }}" != "success" ]]; then
              FAILED="true"
            fi
            if [[ "${{ needs.validate-paperclip-handoff.outputs.attention }}" == "true" ]]; then
              ATTENTION="true"
            fi
          fi

          if [[ "$FAILED" == "true" ]]; then
            echo "- ❌ Async validation lane failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$ATTENTION" == "true" ]]; then
            echo "- ⚠️ Async validation lane passed with warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Async validation lane passed." >> "$GITHUB_STEP_SUMMARY"
          fi
