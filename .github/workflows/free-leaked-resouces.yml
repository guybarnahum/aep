name: Free Leaked Resources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

concurrency:
  group: free-leaked-resources
  cancel-in-progress: false

jobs:
  free-leaked-resources:
    runs-on: ubuntu-latest
    environment:
      name: preview
    defaults:
      run:
        shell: bash -eo pipefail {0}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Free orphaned preview and test resources
        id: free_leaked_resources
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash ./scripts/ci/free-leaked-resources.sh | tee free-leaked-resources.log

      - name: Write summary
        if: always()
        run: |
          echo "## Free leaked resources summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f free-leaked-resources.log ]]; then
            cat free-leaked-resources.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No reaper log found." >> "$GITHUB_STEP_SUMMARY"
          fi