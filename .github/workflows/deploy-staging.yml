name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm test

  debug-staging-secrets:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      deployment: false
    outputs:
      deploy_url: ${{ steps.resolve.outputs.deploy_url }}
      operator_agent_base_url: ${{ steps.resolve.outputs.operator_agent_base_url }}
    steps:
      - name: Debug staging environment configuration presence
        run: |
          if [[ -n "${{ vars.DEPLOY_URL }}" ]]; then
            echo "STAGING_DEPLOY_URL_VAR_PRESENT=true"
          else
            echo "STAGING_DEPLOY_URL_VAR_PRESENT=false"
          fi

          if [[ -n "${{ vars.OPERATOR_AGENT_BASE_URL }}" ]]; then
            echo "STAGING_OPERATOR_AGENT_BASE_URL_VAR_PRESENT=true"
          else
            echo "STAGING_OPERATOR_AGENT_BASE_URL_VAR_PRESENT=false"
          fi

          if [[ -n "${{ secrets.STAGING_BASE_URL }}" ]]; then
            echo "STAGING_BASE_URL_SECRET_PRESENT=true"
          else
            echo "STAGING_BASE_URL_SECRET_PRESENT=false"
          fi

          if [[ -n "${{ secrets.STAGING_OPERATOR_AGENT_BASE_URL }}" ]]; then
            echo "STAGING_OPERATOR_AGENT_BASE_URL_SECRET_PRESENT=true"
          else
            echo "STAGING_OPERATOR_AGENT_BASE_URL_SECRET_PRESENT=false"
          fi

          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
            echo "STAGING_CLOUDFLARE_API_TOKEN_PRESENT=true"
          else
            echo "STAGING_CLOUDFLARE_API_TOKEN_PRESENT=false"
          fi

          if [[ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            echo "STAGING_CLOUDFLARE_ACCOUNT_ID_PRESENT=true"
          else
            echo "STAGING_CLOUDFLARE_ACCOUNT_ID_PRESENT=false"
          fi

      - name: Resolve staging base URLs
        id: resolve
        run: |
          DEPLOY_URL_SOURCE="missing"
          DEPLOY_URL="${{ vars.DEPLOY_URL }}"
          if [[ -n "$DEPLOY_URL" ]]; then
            DEPLOY_URL_SOURCE="vars.DEPLOY_URL"
          else
            DEPLOY_URL="${{ secrets.STAGING_BASE_URL }}"
            if [[ -n "$DEPLOY_URL" ]]; then
              DEPLOY_URL_SOURCE="secrets.STAGING_BASE_URL"
            fi
          fi

          OPERATOR_AGENT_BASE_URL_SOURCE="missing"
          OPERATOR_AGENT_BASE_URL="${{ vars.OPERATOR_AGENT_BASE_URL }}"
          if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
            OPERATOR_AGENT_BASE_URL_SOURCE="vars.OPERATOR_AGENT_BASE_URL"
          else
            OPERATOR_AGENT_BASE_URL="${{ secrets.STAGING_OPERATOR_AGENT_BASE_URL }}"
            if [[ -n "$OPERATOR_AGENT_BASE_URL" ]]; then
              OPERATOR_AGENT_BASE_URL_SOURCE="secrets.STAGING_OPERATOR_AGENT_BASE_URL"
            fi
          fi

          echo "Resolved staging deploy URL source: $DEPLOY_URL_SOURCE"
          echo "Resolved staging operator-agent URL source: $OPERATOR_AGENT_BASE_URL_SOURCE"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "operator_agent_base_url=$OPERATOR_AGENT_BASE_URL" >> "$GITHUB_OUTPUT"

  deploy-staging-env:
    needs:
      - test
      - debug-staging-secrets
    uses: ./.github/workflows/_deploy_environment.yml
    with:
      environment_name: staging
      deploy_url: ${{ needs.debug-staging-secrets.outputs.deploy_url }}
      operator_agent_base_url_fallback: ${{ needs.debug-staging-secrets.outputs.operator_agent_base_url }}
      cf_env: staging
      git_sha: ${{ github.sha }}
      health_runtime_env: staging
      wrangler_config: core/control-plane/wrangler.toml
      d1_database_name: aep-staging
      deploy_operator_agent: false
      operator_agent_wrangler_config: core/operator-agent/wrangler.jsonc
      operator_agent_d1_database_name: aep-operator-agent-staging
      enable_test_endpoints: "false"
      insecure_allow_version_mismatch: true
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  validate-staging-smoke:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_control_plane_smoke.yml
    with:
      deploy_url: ${{ needs.deploy-staging-env.outputs.deploy_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
      smoke_method: "POST"
      smoke_path: "/workflow/start"
      smoke_payload: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status: "202"
      expect_json_key: "workflow_run_id"
      poll_path_template: "/workflow/{id}"
      poll_id_key: "workflow_run_id"
      poll_success_key: "run.status"
      poll_success_values: "completed"
      poll_failure_values: "failed,cancelled"
      poll_attempts: "20"
      poll_interval_ms: "3000"

  validate-staging-post-deploy:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_post_deploy.yml
    with:
      deploy_url: ${{ needs.deploy-staging-env.outputs.deploy_url }}
      operator_agent_base_url: ${{ needs.deploy-staging-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"

  final-summary:
    needs:
      - deploy-staging-env
      - validate-staging-smoke
      - validate-staging-post-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Staging aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy environment: ${{ needs.deploy-staging-env.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane smoke: ${{ needs.validate-staging-smoke.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.validate-staging-post-deploy.outputs.enabled }}" != "true" ]]; then
            echo "- Post-deploy validation: skipped (warning: operator-agent base URL not configured for the staging environment)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- Post-deploy validation: ${{ needs.validate-staging-post-deploy.outputs.outcome }} (attention: WARN/SKIP entries present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Post-deploy validation: ${{ needs.validate-staging-post-deploy.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.deploy-staging-env.result }}" != "success" ]]; then
            echo "- ❌ Staging deploy lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-smoke.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment deployed, but control-plane smoke validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-post-deploy.outputs.enabled }}" == "true" && "${{ needs.validate-staging-post-deploy.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment and smoke passed, but post-deploy validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-post-deploy.outputs.attention }}" == "true" ]]; then
            echo "- ⚠️ Staging deploy lane passed with post-deploy warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Staging deploy lane passed." >> "$GITHUB_STEP_SUMMARY"
          fi
