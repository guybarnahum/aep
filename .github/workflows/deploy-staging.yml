name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm test

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        shell: bash -eo pipefail {0}
    permissions:
      contents: read
    env:
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.STAGING_BASE_URL }}
      CF_ENV: staging
      D1_DATABASE_NAME: aep-staging
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy to Cloudflare
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$CF_ENV" \
            --sha "$GIT_SHA" \
            --insecure-allow-version-mismatch true \
            --service control-plane | tee health-check.log

      - name: Smoke test
        id: smoke_test
        run: |
          npx tsx scripts/ci/smoke-test.ts \
            --base-url "$DEPLOY_URL" \
            --env "$CF_ENV" \
            --method POST \
            --path /workflow/start \
            --payload '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}' \
            --expect-status 202 \
            --expect-json-key workflow_run_id \
            --poll-path-template /workflow/{id} \
            --poll-id-key workflow_run_id \
            --poll-success-key run.status \
            --poll-success-values completed \
            --poll-failure-values failed,cancelled \
            --poll-attempts 20 \
            --poll-interval-ms 3000 | tee smoke-test.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          SMOKE_OUTCOME="${{ steps.smoke_test.outcome }}"

          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: $D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: $GITHUB_EVENT_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Step outcomes" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$SMOKE_OUTCOME") Smoke test: $SMOKE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$HEALTH_OUTCOME" != "success" ]]; then
            echo "> Health check failed. Inspect \`health-check.log\` in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$SMOKE_OUTCOME" != "success" ]]; then
            echo "> Smoke test failed. Inspect \`smoke-test.log\` in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi
