name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare
        id: deploy
        run: |
          npx wrangler deploy --env staging | tee deploy.log

      - name: Export deploy metadata
        run: |
          echo "DEPLOY_URL=${{ secrets.STAGING_BASE_URL }}" >> $GITHUB_ENV
          echo "GIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Wait for readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000

      - name: Health check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env staging \
            --sha "$GIT_SHA" \
            --service control-plane

      - name: Smoke test
        run: |
          npx tsx scripts/ci/smoke-test.ts \
            --base-url "$DEPLOY_URL" \
            --env staging \
            --method POST \
            --path /workflow/start \
            --payload '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker"}' \
            --expect-status 202 \
            --expect-json-key workflow_run_id \
            --poll-path-template /workflow/{id} \
            --poll-id-key workflow_run_id \
            --poll-success-key run.status \
            --poll-success-values completed \
            --poll-failure-values failed,cancelled \
            --poll-attempts 20 \
            --poll-interval-ms 3000

      - name: Write summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- URL: $DEPLOY_URL" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: $GIT_SHA" >> $GITHUB_STEP_SUMMARY