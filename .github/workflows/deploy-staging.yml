name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run test:backend

      - run: npm test

  deploy-staging-env:
    needs: preflight
    uses: ./.github/workflows/_deploy_environment.yml
    with:
      environment_name: staging
      cf_env: staging
      git_sha: ${{ github.sha }}
      health_runtime_env: staging
      wrangler_config: core/control-plane/wrangler.jsonc
      d1_database_name: aep-staging
      deploy_operator_agent: true
      operator_agent_wrangler_config: core/operator-agent/wrangler.jsonc
      operator_agent_d1_database_name: aep-operator-agent-staging
      enable_test_endpoints: "false"
      insecure_allow_version_mismatch: true
      node_version: "20"
      readiness_attempts: "24"
      readiness_interval_ms: "5000"
      readiness_timeout_ms: "8000"
    secrets: inherit

  validate-staging-environment:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_environment_layer.yml
    with:
      environment_name: staging
      control_plane_base_url: ${{ needs.deploy-staging-env.outputs.control_plane_base_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
      smoke_method: "POST"
      smoke_path: "/workflow/start"
      smoke_payload: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status: "202"
      expect_json_key: "workflow_run_id"
      poll_path_template: "/workflow/{id}"
      poll_id_key: "workflow_run_id"
      poll_success_key: "run.status"
      poll_success_values: "completed"
      poll_failure_values: "failed,cancelled"
      poll_attempts: "20"
      poll_interval_ms: "3000"
    secrets: inherit

  validate-staging-schema:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_schema_layer.yml
    with:
      environment_name: staging
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-staging-contracts:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_contracts_layer.yml
    with:
      environment_name: staging
      control_plane_base_url: ${{ needs.deploy-staging-env.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-staging-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-staging-policy:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_policy_layer.yml
    with:
      environment_name: staging
      operator_agent_base_url: ${{ needs.deploy-staging-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
    secrets: inherit

  validate-staging-scenarios:
    needs: deploy-staging-env
    uses: ./.github/workflows/_validate_post_deploy.yml
    with:
      environment_name: staging
      control_plane_base_url: ${{ needs.deploy-staging-env.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-staging-env.outputs.operator_agent_url }}
      cf_env: ${{ needs.deploy-staging-env.outputs.cf_env }}
      git_sha: ${{ needs.deploy-staging-env.outputs.git_sha }}
      node_version: "20"
      execute_work_order_immediately: true
    secrets: inherit

  deploy-dashboard-pages:
    needs:
      - deploy-staging-env
      - validate-staging-environment
      - validate-staging-schema
      - validate-staging-contracts
      - validate-staging-policy
      - validate-staging-scenarios
    uses: ./.github/workflows/_deploy-dashboard-pages.yml
    with:
      environment_name: staging
      control_plane_base_url: ${{ needs.deploy-staging-env.outputs.control_plane_base_url }}
      operator_agent_base_url: ${{ needs.deploy-staging-env.outputs.operator_agent_url }}
      pages_project_name: aep-dashboard-staging
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  final-summary:
    needs:
      - preflight
      - deploy-staging-env
      - validate-staging-environment
      - validate-staging-schema
      - validate-staging-contracts
      - validate-staging-policy
      - validate-staging-scenarios
      - deploy-dashboard-pages
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write aggregate summary
        run: |
          echo "## Staging aggregate summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preflight: ${{ needs.preflight.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy environment: ${{ needs.deploy-staging-env.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment layer: ${{ needs.validate-staging-environment.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schema layer: ${{ needs.validate-staging-schema.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Contracts layer: ${{ needs.validate-staging-contracts.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Policy layer: ${{ needs.validate-staging-policy.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.validate-staging-scenarios.outputs.enabled }}" != "true" ]]; then
            echo "- Scenarios layer: skipped (warning: operator-agent base URL not configured for the staging environment)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-scenarios.outputs.attention }}" == "true" ]]; then
            echo "- Scenarios layer: ${{ needs.validate-staging-scenarios.outputs.outcome }} (attention: WARN/SKIP entries present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Scenarios layer: ${{ needs.validate-staging-scenarios.outputs.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "- Dashboard deploy: ${{ needs.deploy-dashboard-pages.result }}" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lane verdict" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.preflight.result }}" != "success" ]]; then
            echo "- ❌ Staging deploy lane failed during preflight validation." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-staging-env.result }}" != "success" ]]; then
            echo "- ❌ Staging deploy lane failed during environment bring-up." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-environment.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment deployed, but environment-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-schema.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment and environment-layer checks passed, but schema-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-contracts.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment, environment-layer, and schema-layer checks passed, but contracts-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-policy.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment through contracts-layer checks passed, but policy-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-scenarios.outputs.enabled }}" == "true" && "${{ needs.validate-staging-scenarios.outputs.outcome }}" != "success" ]]; then
            echo "- ❌ Staging environment through policy-layer checks passed, but scenario-layer validation failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.validate-staging-scenarios.outputs.attention }}" == "true" ]]; then
            echo "- ⚠️ Staging deploy lane passed with scenario-layer warning/skip attention." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-dashboard-pages.result }}" != "success" ]]; then
            echo "- ❌ Staging validation layers passed, but dashboard deployment failed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ✅ Staging deploy lane passed." >> "$GITHUB_STEP_SUMMARY"
          fi