name: _validate_async_orchestration

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      deploy_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      health_runtime_env:
        required: false
        type: string
        default: dev
      provider:
        required: false
        type: string
        default: cloudflare
      node_version:
        required: false
        type: string
        default: "20"
    outputs:
      enabled:
        description: "Whether async orchestration validation was enabled"
        value: ${{ jobs.validate-async-orchestration.outputs.enabled }}
      outcome:
        description: "Overall outcome of the async orchestration validation suite"
        value: ${{ jobs.validate-async-orchestration.outputs.outcome }}
      attention:
        description: "Whether warning/skip attention signals were present"
        value: ${{ jobs.validate-async-orchestration.outputs.attention }}

permissions:
  contents: read

jobs:
  validate-async-orchestration:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      DEPLOY_URL_INPUT: ${{ inputs.deploy_url }}
      CF_ENV: ${{ inputs.cf_env }}
      GIT_SHA: ${{ inputs.git_sha }}
      HEALTH_RUNTIME_ENV: ${{ inputs.health_runtime_env }}
      PROVIDER: ${{ inputs.provider }}

      DEPLOY_URL: ${{ vars.DEPLOY_URL }}

      PREVIEW_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      ASYNC_VALIDATION_BASE_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}

      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
    outputs:
      enabled: ${{ steps.capture.outputs.enabled }}
      outcome: ${{ steps.capture.outputs.outcome }}
      attention: ${{ steps.capture.outputs.attention }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective deploy URL
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"
          echo "DEPLOY_URL=$RESOLVED_DEPLOY_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_URL_SOURCE=$RESOLVED_DEPLOY_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Check public base URL configuration
        id: base_url_config
        run: |
          if [[ -n "$DEPLOY_URL" && "$DEPLOY_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$DEPLOY_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing deploy_url for _validate_async_orchestration.yml." >&2
              echo "Resolution order is: input -> vars.DEPLOY_URL -> environment secret." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid deploy_url for _validate_async_orchestration.yml: '$DEPLOY_URL'. Must be absolute." >&2
            fi
            exit 1
          fi

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Configure AWS credentials
        if: env.PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: A1 happy path
        id: a1_happy_path
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a1-happy-path | tee a1-happy-path.log

      - name: A2 duplicate terminal callback
        if: env.PROVIDER == 'cloudflare'
        id: a2_duplicate_terminal
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a2-duplicate-succeeded | tee a2-duplicate-terminal.log

      - name: A3 regressive callback ignored
        if: env.PROVIDER == 'cloudflare'
        id: a3_regressive_callback
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a3-regressive-running-after-succeeded | tee a3-regressive-callback.log

      - name: A4 stale callback ignored
        if: env.PROVIDER == 'cloudflare'
        id: a4_stale_callback
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a4-stale-attempt-callback | tee a4-stale-callback.log

      - name: B1 retryable failure then success
        if: env.PROVIDER == 'cloudflare'
        id: b1_retry_then_success
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario b1-retryable-failure-then-success | tee b1-retry-then-success.log

      - name: B2 non-retryable failure
        id: b2_non_retryable_failure
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario b2-non-retryable-failure | tee b2-non-retryable-failure.log

      - name: B3 retry exhaustion
        if: env.PROVIDER == 'cloudflare'
        id: b3_retry_exhaustion
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario b3-retry-exhaustion | tee b3-retry-exhaustion.log

      - name: B4 timeout then retry
        if: env.PROVIDER == 'cloudflare'
        id: b4_timeout_then_retry
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario b4-timeout-then-retry | tee b4-timeout-then-retry.log

      - name: B5 teardown non-retryable failure
        id: b5_teardown_non_retryable_failure
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario b5-teardown-non-retryable-failure | tee b5-teardown-non-retryable-failure.log

      - name: Capture outputs
        id: capture
        if: always()
        run: |
          echo "enabled=true" >> "$GITHUB_OUTPUT"

          ATTENTION="false"
          OUTCOME="success"

          if [[ "${{ steps.base_url_config.outcome }}" != "success" || "${{ steps.health_check.outcome }}" != "success" ]]; then
            OUTCOME="failure"
          elif [[ "$PROVIDER" == "aws" ]]; then
            if [[ "${{ steps.a1_happy_path.outcome }}" != "success" || "${{ steps.b2_non_retryable_failure.outcome }}" != "success" || "${{ steps.b5_teardown_non_retryable_failure.outcome }}" != "success" ]]; then
              OUTCOME="failure"
            fi
          else
            if [[ "${{ steps.a1_happy_path.outcome }}" != "success" || "${{ steps.a2_duplicate_terminal.outcome }}" != "success" || "${{ steps.a3_regressive_callback.outcome }}" != "success" || "${{ steps.a4_stale_callback.outcome }}" != "success" || "${{ steps.b1_retry_then_success.outcome }}" != "success" || "${{ steps.b2_non_retryable_failure.outcome }}" != "success" || "${{ steps.b3_retry_exhaustion.outcome }}" != "success" || "${{ steps.b4_timeout_then_retry.outcome }}" != "success" || "${{ steps.b5_teardown_non_retryable_failure.outcome }}" != "success" ]]; then
              OUTCOME="failure"
            fi
          fi

          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
          echo "attention=$ATTENTION" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          scenario_note() {
            local key="$1"
            local outcome="$2"

            case "$key" in
              A1)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed end-to-end async deploy and teardown happy path."
                else
                  echo "Happy path failed; inspect deploy/teardown orchestration before debugging edge cases."
                fi
                ;;
              A2)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed duplicate terminal callback is a no-op."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Duplicate terminal callback handling may be non-idempotent."
                fi
                ;;
              A3)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed regressive callback is ignored."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Regressive callback may be mutating state unexpectedly."
                fi
                ;;
              A4)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed stale attempt callback cannot mutate logical job state."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Stale callback protection may be broken."
                fi
                ;;
              B1)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed retryable deploy failure can recover via a later attempt."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Retry scheduling or retry recovery may be broken."
                fi
                ;;
              B2)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed non-retryable deploy failure terminates workflow cleanly."
                else
                  echo "Terminal failure propagation may be broken."
                fi
                ;;
              B3)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed retry exhaustion terminates workflow after retry budget is consumed."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Retry exhaustion may leave workflow or job state ambiguous."
                fi
                ;;
              B4)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed timeout advancement can create a retry and recover."
                elif [[ "$outcome" == "skipped" ]]; then
                  echo "Skipped for AWS minimal provider validation."
                else
                  echo "Timeout advancement or retry-after-timeout may be broken."
                fi
                ;;
              B5)
                if [[ "$outcome" == "success" ]]; then
                  echo "Confirmed teardown non-retryable failure terminates workflow and signals possible incomplete cleanup."
                else
                  echo "Teardown terminal failure handling or cleanup-risk signaling may be broken."
                fi
                ;;
              *)
                echo "No interpretation available."
                ;;
            esac
          }

          BASE_URL_CONFIG_OUTCOME="${{ steps.base_url_config.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          A1_OUTCOME="${{ steps.a1_happy_path.outcome }}"
          A2_OUTCOME="${{ steps.a2_duplicate_terminal.outcome || 'skipped' }}"
          A3_OUTCOME="${{ steps.a3_regressive_callback.outcome || 'skipped' }}"
          A4_OUTCOME="${{ steps.a4_stale_callback.outcome || 'skipped' }}"
          B1_OUTCOME="${{ steps.b1_retry_then_success.outcome || 'skipped' }}"
          B2_OUTCOME="${{ steps.b2_non_retryable_failure.outcome }}"
          B3_OUTCOME="${{ steps.b3_retry_exhaustion.outcome || 'skipped' }}"
          B4_OUTCOME="${{ steps.b4_timeout_then_retry.outcome || 'skipped' }}"
          B5_OUTCOME="${{ steps.b5_teardown_non_retryable_failure.outcome }}"

          echo "## Async orchestration validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provider: $PROVIDER" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime env: $HEALTH_RUNTIME_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL source: ${DEPLOY_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$BASE_URL_CONFIG_OUTCOME") Public base URL config: $BASE_URL_CONFIG_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Stage 2A - attempt model and callback idempotency" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A1_OUTCOME") A1 happy path: $A1_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note A1 "$A1_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A2_OUTCOME") A2 duplicate terminal callback: $A2_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note A2 "$A2_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A3_OUTCOME") A3 regressive callback ignored: $A3_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note A3 "$A3_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A4_OUTCOME") A4 stale callback ignored: $A4_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note A4 "$A4_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Stage 2B - retry and timeout policy" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$B1_OUTCOME") B1 retryable failure then success: $B1_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note B1 "$B1_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$B2_OUTCOME") B2 non-retryable failure: $B2_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note B2 "$B2_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$B3_OUTCOME") B3 retry exhaustion: $B3_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note B3 "$B3_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$B4_OUTCOME") B4 timeout then retry: $B4_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note B4 "$B4_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$B5_OUTCOME") B5 teardown non-retryable failure: $B5_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - $(scenario_note B5 "$B5_OUTCOME")" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$BASE_URL_CONFIG_OUTCOME" != "success" ]]; then
            echo "- Deploy URL resolution failed for async orchestration validation." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$HEALTH_OUTCOME" != "success" ]]; then
            echo "- Control-plane preflight failed. Start with /healthz before investigating orchestration scenarios." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$A1_OUTCOME" != "success" ]]; then
            echo "- A1 failed. Inspect the base async orchestration path first; edge-case scenario failures may be downstream noise." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$PROVIDER" == "cloudflare" && ( "$A2_OUTCOME" != "success" || "$A3_OUTCOME" != "success" || "$A4_OUTCOME" != "success" ) ]]; then
            echo "- One or more Stage 2A callback-hardening checks failed. Inspect callback idempotency, invalid-transition handling, and stale-attempt gating." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$B2_OUTCOME" != "success" || "$B5_OUTCOME" != "success" ]]; then
            echo "- One or more required failure-path checks failed. Inspect terminal failure propagation and teardown cleanup-risk handling." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$PROVIDER" == "cloudflare" && ( "$B1_OUTCOME" != "success" || "$B3_OUTCOME" != "success" || "$B4_OUTCOME" != "success" ) ]]; then
            echo "- One or more Stage 2B retry/timeout checks failed. Inspect retry scheduling, retry exhaustion, timeout advancement, and workflow failure propagation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Async orchestration suite passed." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Overall verdict" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.capture.outputs.outcome }}" == "success" ]]; then
            echo "- ✅ Async orchestration validation passed for provider $PROVIDER." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ Async orchestration validation failed for provider $PROVIDER." >> "$GITHUB_STEP_SUMMARY"
          fi