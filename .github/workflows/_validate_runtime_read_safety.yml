name: _validate_runtime_read_safety

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      control_plane_base_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      health_runtime_env:
        required: false
        type: string
        default: dev
      node_version:
        required: false
        type: string
        default: "20"
      tenant_id:
        required: false
        type: string
        default: tenant_internal_aep
      service_id:
        required: false
        type: string
        default: service_control_plane
      company_id:
        required: false
        type: string
        default: company_internal_aep
      team_id:
        required: false
        type: string
        default: team_infra
      employee_id:
        required: false
        type: string
        default: emp_timeout_recovery_01
    outputs:
      outcome:
        description: "Outcome of the runtime read safety validation job"
        value: ${{ jobs.validate-runtime-read-safety.outputs.outcome }}

permissions:
  contents: read

jobs:
  validate-runtime-read-safety:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CONTROL_PLANE_BASE_URL: ${{ vars.CONTROL_PLANE_BASE_URL }}
      CONTROL_PLANE_BASE_URL_INPUT: ${{ inputs.control_plane_base_url }}
      CF_ENV: ${{ inputs.cf_env }}
      GIT_SHA: ${{ inputs.git_sha }}
      HEALTH_RUNTIME_ENV: ${{ inputs.health_runtime_env }}
    outputs:
      outcome: ${{ steps.capture_outcome.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective deploy URL
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_BASE_URL_SOURCE=$RESOLVED_CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Check control-plane base URL configuration
        id: base_url_config
        run: |
          if [[ -n "$CONTROL_PLANE_BASE_URL" && "$CONTROL_PLANE_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$CONTROL_PLANE_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing control_plane_base_url for _validate_runtime_read_safety.yml." >&2
              echo "Resolution order is: input -> vars.CONTROL_PLANE_BASE_URL -> long-lived environment fallback." >&2
              echo "No environment-backed fallback resolved for '${{ inputs.environment_name }}'." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid control_plane_base_url for _validate_runtime_read_safety.yml: '$CONTROL_PLANE_BASE_URL'. Must be absolute." >&2
            fi
            exit 1
          fi

      - name: Control-plane health check
        id: health_check
        run: |
          npx tsx scripts/ci/checks/environment/check-health.ts \
            --url "$CONTROL_PLANE_BASE_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Runtime read safety validation
        id: runtime_read_safety
        run: |
          npm run ci:runtime-read-safety -- \
            --base-url "$CONTROL_PLANE_BASE_URL" \
            --tenant-id "${{ inputs.tenant_id }}" \
            --service-id "${{ inputs.service_id }}" \
            --company-id "${{ inputs.company_id }}" \
            --team-id "${{ inputs.team_id }}" \
            --employee-id "${{ inputs.employee_id }}" \
            --check-forced-failure true | tee runtime-read-safety.log

      - name: Capture outcome
        id: capture_outcome
        if: always()
        run: |
          echo "value=${{ steps.runtime_read_safety.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          OUTCOME="${{ steps.runtime_read_safety.outcome }}"

          echo "## Runtime read safety validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL source: ${CONTROL_PLANE_BASE_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $CONTROL_PLANE_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Forced-failure checks: enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Validation ids" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tenant: ${{ inputs.tenant_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: ${{ inputs.service_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Company: ${{ inputs.company_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Team: ${{ inputs.team_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Employee: ${{ inputs.employee_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$OUTCOME") Runtime read safety: $OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$OUTCOME" != "success" ]]; then
            echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"
            echo "- Runtime read safety validation failed. Inspect runtime-read-safety.log in workflow logs." >> "$GITHUB_STEP_SUMMARY"
          fi