name: _validate_environment_layer

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      control_plane_base_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      smoke_method:
        required: false
        type: string
        default: "POST"
      smoke_path:
        required: false
        type: string
        default: "/workflow/start"
      smoke_payload:
        required: false
        type: string
        default: '{"tenant_id":"t_demo","project_id":"p_demo","repo_url":"https://github.com/example/repo","branch":"main","service_name":"sample-worker","teardown_mode":"sync"}'
      expect_status:
        required: false
        type: string
        default: "202"
      expect_json_key:
        required: false
        type: string
        default: "workflow_run_id"
      poll_path_template:
        required: false
        type: string
        default: "/workflow/{id}"
      poll_id_key:
        required: false
        type: string
        default: "workflow_run_id"
      poll_success_key:
        required: false
        type: string
        default: "run.status"
      poll_success_values:
        required: false
        type: string
        default: "completed"
      poll_failure_values:
        required: false
        type: string
        default: "failed,cancelled"
      poll_attempts:
        required: false
        type: string
        default: "20"
      poll_interval_ms:
        required: false
        type: string
        default: "3000"
    outputs:
      outcome:
        description: "Outcome of the environment layer validation job"
        value: ${{ jobs.validate-environment-layer.outputs.outcome }}

permissions:
  contents: read

jobs:
  validate-environment-layer:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    outputs:
      outcome: ${{ steps.capture_outcome.outputs.value }}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CONTROL_PLANE_BASE_URL_INPUT: ${{ inputs.control_plane_base_url }}
      CONTROL_PLANE_BASE_URL: ${{ vars.CONTROL_PLANE_BASE_URL }}
      CF_ENV: ${{ inputs.cf_env }}
      GIT_SHA: ${{ inputs.git_sha }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective deploy URL
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_BASE_URL_SOURCE=$RESOLVED_CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_ENV"

      - name: Check control-plane base URL configuration
        id: base_url_config
        run: |
          if [[ -n "$CONTROL_PLANE_BASE_URL" && "$CONTROL_PLANE_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$CONTROL_PLANE_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing control_plane_base_url for _validate_environment_layer.yml." >&2
              echo "Resolution order is: input -> vars.CONTROL_PLANE_BASE_URL -> long-lived environment fallback." >&2
              echo "No environment-backed fallback resolved for '${{ inputs.environment_name }}'." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid control_plane_base_url for _validate_environment_layer.yml: '$CONTROL_PLANE_BASE_URL'. Must be absolute." >&2
            fi
            exit 1
          fi

      - name: Run health check
        id: health_check
        run: |
          npx tsx scripts/ci/checks/environment/check-health.ts \
            --url "$CONTROL_PLANE_BASE_URL/healthz" \
            --env "$CF_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Run smoke validation
        id: smoke_validation
        run: |
          npx tsx scripts/ci/checks/environment/smoke-test.ts \
            --base-url "$CONTROL_PLANE_BASE_URL" \
            --env "$CF_ENV" \
            --method "${{ inputs.smoke_method }}" \
            --path "${{ inputs.smoke_path }}" \
            --payload '${{ inputs.smoke_payload }}' \
            --expect-status "${{ inputs.expect_status }}" \
            --expect-json-key "${{ inputs.expect_json_key }}" \
            --poll-path-template "${{ inputs.poll_path_template }}" \
            --poll-id-key "${{ inputs.poll_id_key }}" \
            --poll-success-key "${{ inputs.poll_success_key }}" \
            --poll-success-values "${{ inputs.poll_success_values }}" \
            --poll-failure-values "${{ inputs.poll_failure_values }}" \
            --poll-attempts "${{ inputs.poll_attempts }}" \
            --poll-interval-ms "${{ inputs.poll_interval_ms }}" | tee smoke-validation.log

      - name: Capture outcome
        id: capture_outcome
        if: always()
        run: |
          if [[ "${{ steps.health_check.outcome }}" == "success" && "${{ steps.smoke_validation.outcome }}" == "success" ]]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
          else
            echo "value=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          SMOKE_OUTCOME="${{ steps.smoke_validation.outcome }}"
          LAYER_OUTCOME="${{ steps.capture_outcome.outputs.value }}"

          echo "## Environment layer validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL: $CONTROL_PLANE_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL source: ${CONTROL_PLANE_BASE_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") check-health: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$SMOKE_OUTCOME") smoke-test: $SMOKE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Layer verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$LAYER_OUTCOME") Environment layer: $LAYER_OUTCOME" >> "$GITHUB_STEP_SUMMARY"