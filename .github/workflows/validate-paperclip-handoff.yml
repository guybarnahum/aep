name: Validate Paperclip Handoff

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: validate-paperclip-handoff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-paperclip-handoff:
    runs-on: ubuntu-latest
    environment: async-validation
    defaults:
      run:
        shell: bash -eo pipefail {0}

    env:
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      OPERATOR_AGENT_BASE_URL: ${{ secrets.ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL }}
      CF_ENV: async_validation
      HEALTH_RUNTIME_ENV: dev
      D1_DATABASE_NAME: aep-async-validation
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check public base URL configuration
        id: base_url_config
        run: |
          if [[ -n "$DEPLOY_URL" && "$DEPLOY_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$DEPLOY_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
              echo "Missing ASYNC_VALIDATION_BASE_URL. Configure an absolute https://... base URL." >&2
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
              echo "Invalid ASYNC_VALIDATION_BASE_URL: '$DEPLOY_URL'. Must be absolute, e.g. https://aep-control-plane-async-validation.guybubba.workers.dev" >&2
            fi
            exit 1
          fi

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy control plane
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Check operator-agent configuration
        id: operator_agent_config
        run: |
          if [[ -n "$OPERATOR_AGENT_BASE_URL" && "$OPERATOR_AGENT_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=configured" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [[ -z "$OPERATOR_AGENT_BASE_URL" ]]; then
              echo "reason=missing" >> "$GITHUB_OUTPUT"
            else
              echo "reason=invalid_url" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Paperclip company handoff
        id: paperclip_company_handoff
        if: steps.operator_agent_config.outputs.enabled == 'true'
        run: |
          npm run ci:paperclip-company-handoff-check | tee paperclip-company-handoff.log

      - name: Paperclip first execution
        id: paperclip_first_execution
        if: steps.operator_agent_config.outputs.enabled == 'true'
        run: |
          npm run ci:paperclip-first-execution-check | tee paperclip-first-execution.log

      - name: Scheduled routing
        id: scheduled_routing
        run: |
          npm run ci:scheduled-routing-check | tee scheduled-routing.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          status_text() {
            case "$1" in
              success) echo "passed" ;;
              failure) echo "failed" ;;
              cancelled) echo "cancelled" ;;
              skipped) echo "skipped" ;;
              *) echo "unknown" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          BASE_URL_CONFIG_OUTCOME="${{ steps.base_url_config.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          PAPERCLIP_COMPANY_HANDOFF_OUTCOME="${{ steps.paperclip_company_handoff.outcome }}"
          PAPERCLIP_FIRST_EXECUTION_OUTCOME="${{ steps.paperclip_first_execution.outcome }}"
          SCHEDULED_ROUTING_OUTCOME="${{ steps.scheduled_routing.outcome }}"

          echo "## Paperclip handoff validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: $D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Environment bring-up" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$BASE_URL_CONFIG_OUTCOME") Public base URL config: $BASE_URL_CONFIG_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Paperclip company-origin execution" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$PAPERCLIP_COMPANY_HANDOFF_OUTCOME") Paperclip company handoff: $PAPERCLIP_COMPANY_HANDOFF_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Validates company provenance propagation" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Ensures companyId/taskId/heartbeatId chain integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Confirms scheduler ownership correctness" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$PAPERCLIP_FIRST_EXECUTION_OUTCOME") Paperclip first execution: $PAPERCLIP_FIRST_EXECUTION_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Validates approval-gated first handoff" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Ensures provenance preserved through approval flow" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$SCHEDULED_ROUTING_OUTCOME") Scheduled routing: $SCHEDULED_ROUTING_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Validates cron fallback semantics" >> "$GITHUB_STEP_SUMMARY"
          echo "  - Confirms scheduler-owned execution model" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" != "true" ]]; then
            if [[ "${{ steps.operator_agent_config.outputs.reason }}" == "missing" ]]; then
              echo "- ⚪ Operator-agent checks skipped: ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is not configured." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚪ Operator-agent checks skipped: ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is invalid (must be absolute, e.g. https://... )." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$BASE_URL_CONFIG_OUTCOME" != "success" ]]; then
            if [[ "${{ steps.base_url_config.outputs.reason }}" == "missing" ]]; then
              echo "- Public base URL configuration failed. ASYNC_VALIDATION_BASE_URL is missing." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- Public base URL configuration failed. ASYNC_VALIDATION_BASE_URL must be an absolute URL (for example, https://aep-control-plane-async-validation.guybubba.workers.dev)." >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [[ "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            echo "- Environment bring-up failed. Start with deploy, migrations, readiness, and /healthz before investigating handoff logic." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Environment bring-up passed." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && "$PAPERCLIP_COMPANY_HANDOFF_OUTCOME" != "success" ]]; then
            echo "- Paperclip company handoff validation failed. Inspect provenance chain, companyId/taskId propagation, and ownership semantics." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && "$PAPERCLIP_FIRST_EXECUTION_OUTCOME" != "success" ]]; then
            echo "- Paperclip first execution failed. Inspect approval-gated handoff and provenance preservation through approval flow." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$SCHEDULED_ROUTING_OUTCOME" != "success" ]]; then
            echo "- Scheduled routing validation failed. Inspect scheduler ownership, cron fallback, and routing correctness." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Overall verdict" >> "$GITHUB_STEP_SUMMARY"

          ALL_ENV_OK="true"
          if [[ "$BASE_URL_CONFIG_OUTCOME" != "success" || "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            ALL_ENV_OK="false"
          fi

          ALL_HANDOFF_OK="true"
          if [[ "$SCHEDULED_ROUTING_OUTCOME" != "success" ]]; then
            ALL_HANDOFF_OK="false"
          fi
          if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" && ( "$PAPERCLIP_COMPANY_HANDOFF_OUTCOME" != "success" || "$PAPERCLIP_FIRST_EXECUTION_OUTCOME" != "success" ) ]]; then
            ALL_HANDOFF_OK="false"
          fi

          if [[ "$ALL_ENV_OK" == "true" && "$ALL_HANDOFF_OK" == "true" ]]; then
            if [[ "${{ steps.operator_agent_config.outputs.enabled }}" == "true" ]]; then
              echo "- ✅ Paperclip handoff contract validation passed." >> "$GITHUB_STEP_SUMMARY"
            else
              if [[ "${{ steps.operator_agent_config.outputs.reason }}" == "missing" ]]; then
                echo "- ⚪ Paperclip handoff checks skipped where operator-agent is required because ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is not configured." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "- ⚪ Paperclip handoff checks skipped where operator-agent is required because ASYNC_VALIDATION_OPERATOR_AGENT_BASE_URL is invalid (must be absolute, e.g. https://... )." >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          elif [[ "$ALL_ENV_OK" == "false" ]]; then
            echo "- ❌ Environment bring-up failed; handoff results may be incomplete or misleading." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ Environment bring-up passed, but one or more handoff validation checks failed." >> "$GITHUB_STEP_SUMMARY"
          fi
