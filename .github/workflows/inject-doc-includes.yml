name: inject-doc-includes

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject-doc-includes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Inject shared markdown blocks
        run: |
          bash scripts/ci/inject-doc-blocks.sh \
            LLM.md \
            README.md

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- LLM.md README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated docs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add LLM.md README.md
          git commit -m "docs: inject shared markdown includes"

      - name: Push updated docs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}