name: Validate Operator Governance

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: validate-operator-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    environment: async-validation
    defaults:
      run:
        shell: bash -eo pipefail {0}

    env:
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      CF_ENV: async_validation
      HEALTH_RUNTIME_ENV: dev
      D1_DATABASE_NAME: aep-async-validation
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy control plane
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Manager advisory
        id: manager_advisory
        run: |
          npm run ci:manager-advisory-check | tee manager-advisory.log

      - name: Manager policy overlay
        id: manager_policy_overlay
        run: |
          npm run ci:manager-policy-overlay-check | tee manager-policy-overlay.log

      - name: Escalation audit
        id: escalation_audit
        run: |
          npm run ci:escalation-audit-check | tee escalation-audit.log

      - name: Escalation lifecycle
        id: escalation_lifecycle
        run: |
          npm run ci:escalation-lifecycle-check | tee escalation-lifecycle.log

      - name: Approval state machine
        id: approval_state_machine
        run: |
          npm run ci:approval-state-machine-check | tee approval-state-machine.log

      - name: Paperclip first execution
        id: paperclip_first_execution
        run: |
          npm run ci:paperclip-first-execution-check | tee paperclip-first-execution.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          status_text() {
            case "$1" in
              success) echo "passed" ;;
              failure) echo "failed" ;;
              cancelled) echo "cancelled" ;;
              skipped) echo "skipped" ;;
              *) echo "unknown" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          MANAGER_ADVISORY_OUTCOME="${{ steps.manager_advisory.outcome }}"
          MANAGER_POLICY_OVERLAY_OUTCOME="${{ steps.manager_policy_overlay.outcome }}"
          ESCALATION_AUDIT_OUTCOME="${{ steps.escalation_audit.outcome }}"
          ESCALATION_LIFECYCLE_OUTCOME="${{ steps.escalation_lifecycle.outcome }}"
          APPROVAL_STATE_MACHINE_OUTCOME="${{ steps.approval_state_machine.outcome }}"
          PAPERCLIP_FIRST_EXECUTION_OUTCOME="${{ steps.paperclip_first_execution.outcome }}"

          echo "## Operator governance validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: $D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Environment bring-up" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Manager reasoning and policy" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MANAGER_ADVISORY_OUTCOME") Manager advisory: $MANAGER_ADVISORY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MANAGER_POLICY_OVERLAY_OUTCOME") Manager policy overlay: $MANAGER_POLICY_OVERLAY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Escalation semantics and audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$ESCALATION_AUDIT_OUTCOME") Escalation audit: $ESCALATION_AUDIT_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$ESCALATION_LIFECYCLE_OUTCOME") Escalation lifecycle: $ESCALATION_LIFECYCLE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Approval state machine and execution" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$APPROVAL_STATE_MACHINE_OUTCOME") Approval state machine: $APPROVAL_STATE_MACHINE_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$PAPERCLIP_FIRST_EXECUTION_OUTCOME") Paperclip first execution: $PAPERCLIP_FIRST_EXECUTION_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failure triage" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            echo "- Environment bring-up failed. Start with deploy, migrations, readiness, and /healthz before investigating governance logic." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Environment bring-up passed." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$MANAGER_ADVISORY_OUTCOME" != "success" || "$MANAGER_POLICY_OVERLAY_OUTCOME" != "success" ]]; then
            echo "- Manager reasoning or policy overlay failed. Inspect manager_cron, decision emission, and policy application logic." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$ESCALATION_AUDIT_OUTCOME" != "success" || "$ESCALATION_LIFECYCLE_OUTCOME" != "success" ]]; then
            echo "- Escalation semantics or audit trail failed. Inspect escalation creation, state transitions, and provenance tracking." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$APPROVAL_STATE_MACHINE_OUTCOME" != "success" ]]; then
            echo "- Approval state machine validation failed. Inspect approval endpoints, state transitions, and control history linkage." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$PAPERCLIP_FIRST_EXECUTION_OUTCOME" != "success" ]]; then
            echo "- Paperclip first execution failed. Inspect approval-gated execution flow and provenance propagation." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Overall verdict" >> "$GITHUB_STEP_SUMMARY"

          ALL_ENV_OK="true"
          if [[ "$DEPLOY_OUTCOME" != "success" || "$MIGRATIONS_OUTCOME" != "success" || "$READINESS_OUTCOME" != "success" || "$HEALTH_OUTCOME" != "success" ]]; then
            ALL_ENV_OK="false"
          fi

          ALL_SCENARIO_OK="true"
          if [[ "$MANAGER_ADVISORY_OUTCOME" != "success" || "$MANAGER_POLICY_OVERLAY_OUTCOME" != "success" || "$ESCALATION_AUDIT_OUTCOME" != "success" || "$ESCALATION_LIFECYCLE_OUTCOME" != "success" || "$APPROVAL_STATE_MACHINE_OUTCOME" != "success" || "$PAPERCLIP_FIRST_EXECUTION_OUTCOME" != "success" ]]; then
            ALL_SCENARIO_OK="false"
          fi

          if [[ "$ALL_ENV_OK" == "true" && "$ALL_SCENARIO_OK" == "true" ]]; then
            echo "- ✅ Operator governance validation passed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$ALL_ENV_OK" == "false" ]]; then
            echo "- ❌ Environment bring-up failed; scenario results may be incomplete or misleading." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ Environment bring-up passed, but one or more governance validation scenarios failed." >> "$GITHUB_STEP_SUMMARY"
          fi
