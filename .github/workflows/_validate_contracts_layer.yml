name: _validate_contracts_layer

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      control_plane_base_url:
        required: false
        type: string
      operator_agent_base_url:
        required: false
        type: string
      cf_env:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      enable_synthetic_employee_mutation_checks:
        required: false
        type: boolean
        default: false
      enable_runtime_role_policy_mutation_checks:
        required: false
        type: boolean
        default: false
    outputs:
      outcome:
        description: "Outcome of the contracts layer validation job"
        value: ${{ jobs.validate-contracts-layer.outputs.outcome }}

permissions:
  contents: read

jobs:
  validate-contracts-layer:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    outputs:
      outcome: ${{ steps.capture_outcome.outputs.value }}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      CONTROL_PLANE_BASE_URL_INPUT: ${{ inputs.control_plane_base_url }}
      CONTROL_PLANE_BASE_URL: ${{ vars.CONTROL_PLANE_BASE_URL }}
      OPERATOR_AGENT_BASE_URL_INPUT: ${{ inputs.operator_agent_base_url }}
      OPERATOR_AGENT_BASE_URL: ${{ vars.OPERATOR_AGENT_BASE_URL }}
      CF_ENV: ${{ inputs.cf_env }}
      GIT_SHA: ${{ inputs.git_sha }}
      OPERATOR_AGENT_ENABLE_SYNTHETIC_MUTATION_CHECKS: ${{ inputs.enable_synthetic_employee_mutation_checks && 'true' || 'false' }}
      OPERATOR_AGENT_ENABLE_RUNTIME_ROLE_POLICY_MUTATION_CHECKS: ${{ inputs.enable_runtime_role_policy_mutation_checks && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Resolve effective validation URLs
        run: |
          eval "$(bash ./scripts/ci/resolve-environment-urls.sh)"

          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_BASE_URL_SOURCE=$RESOLVED_CONTROL_PLANE_BASE_URL_SOURCE" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL=$RESOLVED_OPERATOR_AGENT_BASE_URL" >> "$GITHUB_ENV"
          echo "OPERATOR_AGENT_BASE_URL_SOURCE=$RESOLVED_OPERATOR_AGENT_BASE_URL_SOURCE" >> "$GITHUB_ENV"

          # Legacy aliases still expected by some CI scripts
          echo "CONTROL_PLANE_BASE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"
          echo "CONTROL_PLANE_URL=$RESOLVED_CONTROL_PLANE_BASE_URL" >> "$GITHUB_ENV"

      - name: Check contracts layer configuration
        id: config
        run: |
          if [[ -z "$CONTROL_PLANE_BASE_URL" || ! "$CONTROL_PLANE_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "Invalid or missing CONTROL_PLANE_BASE_URL for contracts layer." >&2
            exit 1
          fi

          if [[ -z "$OPERATOR_AGENT_BASE_URL" || ! "$OPERATOR_AGENT_BASE_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "Invalid or missing OPERATOR_AGENT_BASE_URL for contracts layer." >&2
            exit 1
          fi

      - name: Run operator-agent contract check
        id: operator_agent_contract
        run: npx tsx scripts/ci/checks/contracts/operator-agent-contract-check.ts | tee operator-agent-contract-check.log

      - name: Run task-type contract check
        id: task_type_contract
        run: npx tsx scripts/ci/checks/contracts/task-type-contract-check.ts | tee task-type-contract-check.log

      - name: Run task-type normalization contract check
        id: task_type_normalization_contract
        run: npx tsx scripts/ci/checks/contracts/task-type-normalization-contract-check.ts | tee task-type-normalization-contract-check.log

      - name: Run task-payload contract check
        id: task_payload_contract
        run: npx tsx scripts/ci/checks/contracts/task-payload-contract-check.ts | tee task-payload-contract-check.log

      - name: Run task-payload normalization contract check
        id: task_payload_normalization_contract
        run: npx tsx scripts/ci/checks/contracts/task-payload-normalization-contract-check.ts | tee task-payload-normalization-contract-check.log

      - name: Run team-loop specialization contract check
        id: team_loop_specialization_contract
        run: npx tsx scripts/ci/checks/contracts/team-loop-specialization-contract-check.ts | tee team-loop-specialization-contract-check.log

      - name: Run hardcoded runtime identifier guardrail
        id: no_hardcoded_runtime_identifiers
        run: npm run ci:no-hardcoded-runtime-identifiers | tee no-hardcoded-runtime-identifiers-check.log

      - name: Run runtime projection check
        id: runtime_projection
        run: npx tsx scripts/ci/checks/contracts/runtime-projection-check.ts | tee runtime-projection-check.log

      - name: Run employee scope check
        id: employee_scope
        run: npx tsx scripts/ci/checks/contracts/employee-scope-check.ts | tee employee-scope-check.log

      - name: Run service provider check
        id: service_provider
        run: npx tsx scripts/ci/checks/contracts/service-provider-check.ts | tee service-provider-check.log

      - name: Run provider provenance check
        id: provider_provenance
        run: npx tsx scripts/ci/checks/contracts/provider-provenance-check.ts | tee provider-provenance-check.log

      - name: Run runtime provenance check
        id: runtime_provenance
        run: npx tsx scripts/ci/checks/contracts/runtime-provenance-check.ts | tee runtime-provenance-check.log

      - name: Run runtime tenant catalog check
        id: runtime_tenant_catalog
        run: npx tsx scripts/ci/checks/contracts/runtime-tenant-catalog-check.ts | tee runtime-tenant-catalog-check.log

      - name: Run employee cognition boundary check
        id: employee_cognition_boundary
        run: npx tsx scripts/ci/checks/contracts/employee-cognition-boundary-check.ts | tee employee-cognition-boundary-check.log

      - name: Run cognition effective policy context check
        id: cognition_effective_policy_context
        run: npx tsx scripts/ci/checks/scenarios/cognition-effective-policy-context-check.ts | tee cognition-effective-policy-context-check.log

      - name: Run validation result artifact check
        id: validation_result_artifact
        run: npx tsx scripts/ci/checks/contracts/validation-result-artifact-check.ts | tee validation-result-artifact-check.log

      - name: Run task visibility summary check
        id: task_visibility_summary
        run: npx tsx scripts/ci/checks/contracts/task-visibility-summary-check.ts | tee task-visibility-summary-check.log

      - name: Employee persona continuity check
        run: npx tsx scripts/ci/checks/contracts/employee-persona-continuity-check.ts

      - name: Run thread rationale publication check
        id: thread_rationale_publication
        run: npx tsx scripts/ci/checks/contracts/thread-rationale-publication-check.ts | tee thread-rationale-publication-check.log

      - name: Run public rationale artifact check
        id: public_rationale_artifact
        run: npx tsx scripts/ci/checks/contracts/public-rationale-artifact-check.ts | tee public-rationale-artifact-check.log

      - name: Run thread task delegation contract check
        id: thread_task_delegation_contract
        run: npx tsx scripts/ci/checks/contracts/thread-task-delegation-contract-check.ts | tee thread-task-delegation-contract-check.log

      - name: Run role realism contract check
        id: role_realism_contract
        run: npx tsx scripts/ci/checks/contracts/role-realism-contract-check.ts | tee role-realism-contract-check.log

      - name: Run staffing system contract check
        id: staffing_system_contract
        run: npm run ci:staffing-system-contract-check | tee staffing-system-contract-check.log

      - name: Run product initiative contract check
        id: product_initiative_contract
        continue-on-error: true
        run: npm run ci:product-initiative-contract-check | tee product-initiative-contract-check.log

      - name: Run deployable artifact contract check
        id: deployable_artifact_contract
        continue-on-error: true
        run: npm run ci:deployable-artifact-contract-check | tee deployable-artifact-contract-check.log

      - name: Run deployment system contract check
        id: deployment_system_contract
        continue-on-error: true
        run: npm run ci:deployment-system-contract-check | tee deployment-system-contract-check.log

      - name: Run external surface contract check
        id: external_surface_contract
        continue-on-error: true
        run: npm run ci:external-surface-contract-check | tee external-surface-contract-check.log

      - name: Run customer intake flow contract check
        id: customer_intake_flow_contract
        continue-on-error: true
        run: npm run ci:customer-intake-flow-contract-check | tee customer-intake-flow-contract-check.log

      - name: Run agentic execution contract check
        id: agentic_execution_contract
        continue-on-error: true
        run: npm run ci:agentic-execution-contract-check | tee agentic-execution-contract-check.log

      - name: Run product visibility contract check
        id: product_visibility_contract
        continue-on-error: true
        run: npm run ci:product-visibility-contract-check | tee product-visibility-contract-check.log

      - name: Run product UI contract check
        id: product_ui_contract
        continue-on-error: true
        run: npm run ci:product-ui-contract-check | tee product-ui-contract-check.log

      - name: Run provider adapter contract check
        id: provider_adapter_contract
        continue-on-error: true
        run: npm run ci:provider-adapter-contract-check | tee provider-adapter-contract-check.log

      - name: Run provider real execution contract check
        id: provider_real_execution_contract
        continue-on-error: true
        run: npm run ci:provider-real-execution-contract-check | tee provider-real-execution-contract-check.log

      - name: Run full product UI contract check
        id: full_product_ui_contract
        continue-on-error: true
        run: npm run ci:full-product-ui-contract-check | tee full-product-ui-contract-check.log

      - name: Run jira ingest contract check
        id: jira_ingest_contract
        continue-on-error: true
        run: npm run ci:jira-ingest-contract-check | tee jira-ingest-contract-check.log

      - name: Run signal ingest contract check
        id: signal_ingest_contract
        continue-on-error: true
        run: npm run ci:signal-ingest-contract-check | tee signal-ingest-contract-check.log

      - name: Run lifecycle contract check
        id: lifecycle_contract
        continue-on-error: true
        run: npm run ci:lifecycle-contract-check | tee lifecycle-contract-check.log

      - name: Run lifecycle execution contract check
        id: lifecycle_execution_contract
        continue-on-error: true
        run: npm run ci:lifecycle-execution-contract-check | tee lifecycle-execution-contract-check.log

      - name: Run manual tutorial readiness contract check
        id: manual_tutorial_readiness_contract
        continue-on-error: true
        run: npm run ci:manual-tutorial-readiness-contract-check | tee manual-tutorial-readiness-contract-check.log

      - name: Run boundary enforcement check
        id: boundary_enforcement
        continue-on-error: true
        run: npm run ci:boundary-enforcement-check | tee boundary-enforcement-check.log

      - name: Run tutorial alignment check
        id: tutorial_alignment
        continue-on-error: true
        run: npm run ci:tutorial-alignment-check | tee tutorial-alignment-check.log

      - name: Capture outcome
        id: capture_outcome
        if: always()
        run: |
          if [[ \
            "${{ steps.operator_agent_contract.outcome }}" == "success" && \
            "${{ steps.task_type_contract.outcome }}" == "success" && \
            "${{ steps.task_type_normalization_contract.outcome }}" == "success" && \
            "${{ steps.task_payload_contract.outcome }}" == "success" && \
            "${{ steps.task_payload_normalization_contract.outcome }}" == "success" && \
            "${{ steps.team_loop_specialization_contract.outcome }}" == "success" && \
            "${{ steps.no_hardcoded_runtime_identifiers.outcome }}" == "success" && \
            "${{ steps.runtime_projection.outcome }}" == "success" && \
            "${{ steps.employee_scope.outcome }}" == "success" && \
            "${{ steps.service_provider.outcome }}" == "success" && \
            "${{ steps.provider_provenance.outcome }}" == "success" && \
            "${{ steps.runtime_provenance.outcome }}" == "success" && \
            "${{ steps.runtime_tenant_catalog.outcome }}" == "success" && \
            "${{ steps.employee_cognition_boundary.outcome }}" == "success" && \
            "${{ steps.cognition_effective_policy_context.outcome }}" == "success" && \
            "${{ steps.validation_result_artifact.outcome }}" == "success" && \
            "${{ steps.task_visibility_summary.outcome }}" == "success" && \
            "${{ steps.thread_rationale_publication.outcome }}" == "success" && \
            "${{ steps.public_rationale_artifact.outcome }}" == "success" && \
            "${{ steps.thread_task_delegation_contract.outcome }}" == "success" && \
            "${{ steps.role_realism_contract.outcome }}" == "success" && \
            "${{ steps.staffing_system_contract.outcome }}" == "success" && \
            "${{ steps.product_initiative_contract.outcome }}" == "success" && \
            "${{ steps.deployable_artifact_contract.outcome }}" == "success" && \
            "${{ steps.deployment_system_contract.outcome }}" == "success" && \
            "${{ steps.external_surface_contract.outcome }}" == "success" && \
            "${{ steps.customer_intake_flow_contract.outcome }}" == "success" && \
            "${{ steps.agentic_execution_contract.outcome }}" == "success" && \
            "${{ steps.product_visibility_contract.outcome }}" == "success" && \
            "${{ steps.product_ui_contract.outcome }}" == "success" && \
            "${{ steps.provider_adapter_contract.outcome }}" == "success" && \
            "${{ steps.provider_real_execution_contract.outcome }}" == "success" && \
            "${{ steps.full_product_ui_contract.outcome }}" == "success" && \
            "${{ steps.jira_ingest_contract.outcome }}" == "success" && \
            "${{ steps.signal_ingest_contract.outcome }}" == "success" && \
            "${{ steps.lifecycle_contract.outcome }}" == "success" && \
            "${{ steps.lifecycle_execution_contract.outcome }}" == "success" && \
            "${{ steps.manual_tutorial_readiness_contract.outcome }}" == "success" && \
            "${{ steps.boundary_enforcement.outcome }}" == "success" && \
            "${{ steps.tutorial_alignment.outcome }}" == "success" \
          ]]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
          else
            echo "value=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          LAYER_OUTCOME="${{ steps.capture_outcome.outputs.value }}"

          echo "## Contracts layer validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- Synthetic employee mutation checks: $OPERATOR_AGENT_ENABLE_SYNTHETIC_MUTATION_CHECKS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime role policy mutation checks: $OPERATOR_AGENT_ENABLE_RUNTIME_ROLE_POLICY_MUTATION_CHECKS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Control-plane URL source: ${CONTROL_PLANE_BASE_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Operator-agent URL source: ${OPERATOR_AGENT_BASE_URL_SOURCE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.operator_agent_contract.outcome }}") operator-agent-contract-check: ${{ steps.operator_agent_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.task_type_contract.outcome }}") task-type-contract-check: ${{ steps.task_type_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.task_type_normalization_contract.outcome }}") task-type-normalization-contract-check: ${{ steps.task_type_normalization_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.task_payload_contract.outcome }}") task-payload-contract-check: ${{ steps.task_payload_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.task_payload_normalization_contract.outcome }}") task-payload-normalization-contract-check: ${{ steps.task_payload_normalization_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.team_loop_specialization_contract.outcome }}") team-loop-specialization-contract-check: ${{ steps.team_loop_specialization_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.no_hardcoded_runtime_identifiers.outcome }}") no-hardcoded-runtime-identifiers-check: ${{ steps.no_hardcoded_runtime_identifiers.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.runtime_projection.outcome }}") runtime-projection-check: ${{ steps.runtime_projection.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.employee_scope.outcome }}") employee-scope-check: ${{ steps.employee_scope.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.service_provider.outcome }}") service-provider-check: ${{ steps.service_provider.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.provider_provenance.outcome }}") provider-provenance-check: ${{ steps.provider_provenance.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.runtime_provenance.outcome }}") runtime-provenance-check: ${{ steps.runtime_provenance.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.runtime_tenant_catalog.outcome }}") runtime-tenant-catalog-check: ${{ steps.runtime_tenant_catalog.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "${{ steps.employee_cognition_boundary.outcome }}") employee-cognition-boundary-check: ${{ steps.employee_cognition_boundary.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.cognition_effective_policy_context.outcome }}\") cognition-effective-policy-context-check: ${{ steps.cognition_effective_policy_context.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.validation_result_artifact.outcome }}\") validation-result-artifact-check: ${{ steps.validation_result_artifact.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.task_visibility_summary.outcome }}\") task-visibility-summary-check: ${{ steps.task_visibility_summary.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.thread_rationale_publication.outcome }}\") thread-rationale-publication-check: ${{ steps.thread_rationale_publication.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.public_rationale_artifact.outcome }}\") public-rationale-artifact-check: ${{ steps.public_rationale_artifact.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.thread_task_delegation_contract.outcome }}\") thread-task-delegation-contract-check: ${{ steps.thread_task_delegation_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.role_realism_contract.outcome }}\") role-realism-contract-check: ${{ steps.role_realism_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.staffing_system_contract.outcome }}\") staffing-system-contract-check: ${{ steps.staffing_system_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.product_initiative_contract.outcome }}\") product-initiative-contract-check: ${{ steps.product_initiative_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.deployable_artifact_contract.outcome }}\") deployable-artifact-contract-check: ${{ steps.deployable_artifact_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.deployment_system_contract.outcome }}\") deployment-system-contract-check: ${{ steps.deployment_system_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.external_surface_contract.outcome }}\") external-surface-contract-check: ${{ steps.external_surface_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.customer_intake_flow_contract.outcome }}\") customer-intake-flow-contract-check: ${{ steps.customer_intake_flow_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.agentic_execution_contract.outcome }}\") agentic-execution-contract-check: ${{ steps.agentic_execution_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.product_visibility_contract.outcome }}\") product-visibility-contract-check: ${{ steps.product_visibility_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.product_ui_contract.outcome }}\") product-ui-contract-check: ${{ steps.product_ui_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.provider_adapter_contract.outcome }}\") provider-adapter-contract-check: ${{ steps.provider_adapter_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.provider_real_execution_contract.outcome }}\") provider-real-execution-contract-check: ${{ steps.provider_real_execution_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.full_product_ui_contract.outcome }}\") full-product-ui-contract-check: ${{ steps.full_product_ui_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.jira_ingest_contract.outcome }}\") jira-ingest-contract-check: ${{ steps.jira_ingest_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.signal_ingest_contract.outcome }}\") signal-ingest-contract-check: ${{ steps.signal_ingest_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.lifecycle_contract.outcome }}\") lifecycle-contract-check: ${{ steps.lifecycle_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.lifecycle_execution_contract.outcome }}\") lifecycle-execution-contract-check: ${{ steps.lifecycle_execution_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.manual_tutorial_readiness_contract.outcome }}\") manual-tutorial-readiness-contract-check: ${{ steps.manual_tutorial_readiness_contract.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.boundary_enforcement.outcome }}\") boundary-enforcement-check: ${{ steps.boundary_enforcement.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji \"${{ steps.tutorial_alignment.outcome }}\") tutorial-alignment-check: ${{ steps.tutorial_alignment.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Layer verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$LAYER_OUTCOME") Contracts layer: $LAYER_OUTCOME" >> "$GITHUB_STEP_SUMMARY"