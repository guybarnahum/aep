name: Deploy Dashboard Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/deploy-dashboard-pages.yml"

jobs:
  deploy-dashboard-pages:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm install

      - name: Build dashboard
        working-directory: apps/dashboard
        env:
          VITE_CONTROL_PLANE_BASE_URL: ${{ vars.VITE_CONTROL_PLANE_BASE_URL }}
          VITE_OPERATOR_AGENT_BASE_URL: ${{ vars.VITE_OPERATOR_AGENT_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}"
