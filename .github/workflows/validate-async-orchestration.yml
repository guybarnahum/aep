name: Validate Async Orchestration

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Deployment provider"
        required: false
        default: "cloudflare"

jobs:
  validate-async:
    runs-on: ubuntu-latest
    environment: async-validation

    env:
      PROVIDER: ${{ github.event.inputs.provider }}
      GIT_SHA: ${{ github.sha }}
      DEPLOY_URL: ${{ secrets.ASYNC_VALIDATION_BASE_URL }}
      CF_ENV: async_validation
      HEALTH_RUNTIME_ENV: dev
      D1_DATABASE_NAME: aep-async-validation
      WRANGLER_CONFIG: core/control-plane/wrangler.toml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - run: npm run build

      - name: Deploy control plane (async-validation)
        id: deploy_cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$WRANGLER_CONFIG" \
            --env "$CF_ENV" | tee deploy.log

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for readiness
        id: wait_readiness
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts 24 \
            --interval-ms 5000 \
            --timeout-ms 8000 | tee wait-for-url.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: A1 happy path
        id: a1_happy_path
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a1-happy-path | tee a1-happy-path.log

      - name: A2 duplicate terminal callback
        id: a2_duplicate_terminal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a2-duplicate-succeeded | tee a2-duplicate-terminal.log

      - name: A3 regressive callback ignored
        id: a3_regressive_callback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a3-regressive-running-after-succeeded | tee a3-regressive-callback.log

      - name: A4 stale callback ignored
        id: a4_stale_callback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/ci/async-deploy-check.ts \
            --base-url "$DEPLOY_URL" \
            --provider "$PROVIDER" \
            --service-name sample-worker \
            --scenario a4-stale-attempt-callback | tee a4-stale-callback.log

      - name: Write summary
        if: always()
        run: |
          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped) echo "⚪" ;;
              *) echo "❓" ;;
            esac
          }

          DEPLOY_OUTCOME="${{ steps.deploy_cf.outcome }}"
          MIGRATIONS_OUTCOME="${{ steps.d1_migrations.outcome }}"
          READINESS_OUTCOME="${{ steps.wait_readiness.outcome }}"
          HEALTH_OUTCOME="${{ steps.health_check.outcome }}"
          A1_OUTCOME="${{ steps.a1_happy_path.outcome }}"
          A2_OUTCOME="${{ steps.a2_duplicate_terminal.outcome }}"
          A3_OUTCOME="${{ steps.a3_regressive_callback.outcome }}"
          A4_OUTCOME="${{ steps.a4_stale_callback.outcome }}"

          echo "## Async validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $CF_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Environment bring-up" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$DEPLOY_OUTCOME") Worker deploy: $DEPLOY_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$MIGRATIONS_OUTCOME") D1 migrations: $MIGRATIONS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$READINESS_OUTCOME") Readiness check: $READINESS_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$HEALTH_OUTCOME") Health check: $HEALTH_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Stage 2A scenarios" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A1_OUTCOME") A1 happy path: $A1_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A2_OUTCOME") A2 duplicate terminal callback: $A2_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A3_OUTCOME") A3 regressive callback ignored: $A3_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
          echo "- $(status_emoji "$A4_OUTCOME") A4 stale callback ignored: $A4_OUTCOME" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$A1_OUTCOME" != "success" ]]; then
            echo "> A1 failed. Inspect \`a1-happy-path.log\`." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$A2_OUTCOME" != "success" ]]; then
            echo "> A2 failed. Inspect \`a2-duplicate-terminal.log\`." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$A3_OUTCOME" != "success" ]]; then
            echo "> A3 failed. Inspect \`a3-regressive-callback.log\`." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$A4_OUTCOME" != "success" ]]; then
            echo "> A4 failed. Inspect \`a4-stale-callback.log\`." >> "$GITHUB_STEP_SUMMARY"
          fi