name: _deploy_preview_environment

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      git_sha:
        required: true
        type: string
      health_runtime_env:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      readiness_attempts:
        required: false
        type: string
        default: "24"
      readiness_interval_ms:
        required: false
        type: string
        default: "5000"
      readiness_timeout_ms:
        required: false
        type: string
        default: "8000"
      deploy_operator_agent:
        required: false
        type: boolean
        default: false
    outputs:
      deploy_url:
        description: "Resolved preview control-plane deploy URL"
        value: ${{ jobs.deploy-preview-environment.outputs.deploy_url }}
      preview_key:
        description: "Preview identity key"
        value: ${{ jobs.deploy-preview-environment.outputs.preview_key }}
      worker_name:
        description: "Preview worker name"
        value: ${{ jobs.deploy-preview-environment.outputs.worker_name }}
      d1_database_name:
        description: "Preview D1 database name"
        value: ${{ jobs.deploy-preview-environment.outputs.d1_database_name }}
      d1_database_id:
        description: "Preview D1 database id"
        value: ${{ jobs.deploy-preview-environment.outputs.d1_database_id }}
      git_sha:
        description: "Git SHA used for deploy and validation"
        value: ${{ jobs.deploy-preview-environment.outputs.git_sha }}
      control_plane_ready:
        description: "Whether preview control-plane readiness succeeded"
        value: ${{ jobs.deploy-preview-environment.outputs.control_plane_ready }}
      health_outcome:
        description: "Outcome of preview control-plane health check"
        value: ${{ jobs.deploy-preview-environment.outputs.health_outcome }}

permissions:
  contents: read

jobs:
  deploy-preview-environment:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      GIT_SHA: ${{ inputs.git_sha }}
      HEALTH_RUNTIME_ENV: ${{ inputs.health_runtime_env }}
      PREVIEW_TEMPLATE_PATH: core/control-plane/wrangler.preview.jsonc.template
      PREVIEW_OUTPUT_PATH: core/control-plane/wrangler.preview.generated.jsonc
    outputs:
      deploy_url: ${{ steps.export_outputs.outputs.deploy_url }}
      preview_key: ${{ steps.export_outputs.outputs.preview_key }}
      worker_name: ${{ steps.export_outputs.outputs.worker_name }}
      d1_database_name: ${{ steps.export_outputs.outputs.d1_database_name }}
      d1_database_id: ${{ steps.export_outputs.outputs.d1_database_id }}
      git_sha: ${{ steps.export_outputs.outputs.git_sha }}
      control_plane_ready: ${{ steps.export_outputs.outputs.control_plane_ready }}
      health_outcome: ${{ steps.export_outputs.outputs.health_outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - run: npm ci

      - name: Generate build metadata
        run: ./scripts/ci/generate-build-meta.sh

      - name: Derive preview identity
        id: preview_identity
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && -n "${{ github.event.pull_request.number }}" ]]; then
            PREVIEW_KEY="pr-${{ github.event.pull_request.number }}"
          else
            echo "Ephemeral preview deploy is only supported for pull_request events." >&2
            exit 1
          fi

          PREVIEW_WORKER_NAME="aep-control-plane-${PREVIEW_KEY}"
          PREVIEW_D1_DATABASE_NAME="aep-preview-${PREVIEW_KEY}"

          echo "PREVIEW_KEY=$PREVIEW_KEY" >> "$GITHUB_ENV"
          echo "PREVIEW_WORKER_NAME=$PREVIEW_WORKER_NAME" >> "$GITHUB_ENV"
          echo "PREVIEW_D1_DATABASE_NAME=$PREVIEW_D1_DATABASE_NAME" >> "$GITHUB_ENV"

      - name: Ensure preview D1 database exists
        id: ensure_d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export D1_DATABASE_NAME="$PREVIEW_D1_DATABASE_NAME"
          D1_ENV_OUTPUT="$(bash ./scripts/ci/ensure-d1-database.sh)"
          eval "$D1_ENV_OUTPUT"
          echo "PREVIEW_D1_DATABASE_ID=$D1_DATABASE_ID" >> "$GITHUB_ENV"
          echo "PREVIEW_D1_DATABASE_CREATED=$D1_DATABASE_CREATED" >> "$GITHUB_ENV"

      - name: Generate preview Wrangler config
        run: |
          PREVIEW_KEY="${PREVIEW_KEY}" \
          PREVIEW_TEMPLATE_PATH="${PREVIEW_TEMPLATE_PATH}" \
          PREVIEW_OUTPUT_PATH="${PREVIEW_OUTPUT_PATH}" \
          PREVIEW_WORKER_NAME="${PREVIEW_WORKER_NAME}" \
          PREVIEW_D1_DATABASE_NAME="${PREVIEW_D1_DATABASE_NAME}" \
          PREVIEW_D1_DATABASE_ID="${PREVIEW_D1_DATABASE_ID}" \
          bash ./scripts/ci/create-preview-wrangler-config.sh

      - run: npm run build

      - name: Deploy preview control-plane
        id: deploy_control_plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config "$PREVIEW_OUTPUT_PATH" | tee deploy-preview-control-plane.log

      - name: Resolve deploy URL
        id: resolve_url
        run: |
          DEPLOY_URL="$(grep -Eo 'https://[A-Za-z0-9._-]+\.workers\.dev' deploy-preview-control-plane.log | tail -n1 || true)"

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "Failed to resolve preview deploy URL from wrangler output." >&2
            exit 1
          fi

          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"

      - name: Apply D1 migrations
        id: d1_migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_CONFIG: ${{ env.PREVIEW_OUTPUT_PATH }}
          APPLY_OPERATOR_AGENT_MIGRATIONS: "false"
        run: |
          export D1_DATABASE_NAME="$PREVIEW_D1_DATABASE_NAME"
          ./scripts/ci/apply-d1-migrations.sh | tee migrations.log

      - name: Wait for control-plane readiness
        id: wait_control_plane
        run: |
          npx tsx scripts/ci/wait-for-url.ts \
            --url "$DEPLOY_URL/healthz" \
            --attempts "${{ inputs.readiness_attempts }}" \
            --interval-ms "${{ inputs.readiness_interval_ms }}" \
            --timeout-ms "${{ inputs.readiness_timeout_ms }}" | tee wait-control-plane.log

      - name: Health check
        id: health_check
        run: |
          npx tsx scripts/ci/check-health.ts \
            --url "$DEPLOY_URL/healthz" \
            --env "$HEALTH_RUNTIME_ENV" \
            --sha "$GIT_SHA" \
            --service control-plane | tee health-check.log

      - name: Cleanup failed preview resources
        if: ${{ failure() }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "${PREVIEW_WORKER_NAME:-}" && -n "${PREVIEW_D1_DATABASE_NAME:-}" ]]; then
            bash ./scripts/ci/destroy-preview-resources.sh | tee cleanup-failed-preview.log
          fi

      - name: Export outputs
        id: export_outputs
        if: always()
        run: |
          CONTROL_PLANE_READY="false"
          if [[ "${{ steps.wait_control_plane.outcome }}" == "success" ]]; then
            CONTROL_PLANE_READY="true"
          fi

          echo "deploy_url=${DEPLOY_URL:-}" >> "$GITHUB_OUTPUT"
          echo "preview_key=$PREVIEW_KEY" >> "$GITHUB_OUTPUT"
          echo "worker_name=$PREVIEW_WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "d1_database_name=$PREVIEW_D1_DATABASE_NAME" >> "$GITHUB_OUTPUT"
          echo "d1_database_id=${PREVIEW_D1_DATABASE_ID:-}" >> "$GITHUB_OUTPUT"
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "control_plane_ready=$CONTROL_PLANE_READY" >> "$GITHUB_OUTPUT"
          echo "health_outcome=${{ steps.health_check.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "## Preview environment deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview key: $PREVIEW_KEY" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker name: $PREVIEW_WORKER_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- D1 database: $PREVIEW_D1_DATABASE_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- D1 database id: ${PREVIEW_D1_DATABASE_ID:-<unresolved>}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${DEPLOY_URL:-<unresolved>}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: $GIT_SHA" >> "$GITHUB_STEP_SUMMARY"